// «Внешних источников» в базовом ответе нет: веб-ответ доступен через переключатель-глобус
const TOC_SECTIONS = [
  ['ans',   'Ответ'],
  ['conf',  'Противоречия'],
  ['gaps',  'Пробелы'],
  ['hyp',   'Гипотезы'],
  ['facts', 'Прямые факты и эксперименты'],
  ['rel',   'Смежные данные'],
  ['notes', 'Источники'],
];

function viewArticle(view){
  const st = S.article;
  if (!st){ location.hash = '#/'; return; }
  if (st.phase === 'offtopic'){ paintOfftopic(view); return; }
  if (st.phase === 'error'){ paintAskError(view, st); return; }
  // phase 'aborted' сюда не попадает: отмена бывает только при новом вопросе,
  // и ask() тут же заменяет S.article свежим состоянием

  const cols = el('div', 'cols3');
  const toc = el('nav', 'toc'); toc.id = 'toc';
  // скролл-обёртка «текст + инфобокс»: единственный скролл-контейнер экрана статьи
  const wrap = el('div', 'artwrap'); wrap.id = 'artscroll';
  const art = el('article'); art.id = 'artbody'; art.style.position = 'relative';
  const box = el('aside', 'infobox'); box.id = 'infobox';
  // попап сноски позиционируется по viewport-координатам — при скролле обёртки
  // он отрывается от своей сноски, поэтому прячем его; заодно обновляем скролл-spy
  // (слушатель зарегистрирован на самой обёртке и удаляется вместе с ней при перерисовке view)
  wrap.addEventListener('scroll', () => { hideFnpop(); scheduleSpy(); }, { passive: true });
  wrap.append(art, box);
  cols.append(toc, wrap);
  view.append(cols);

  const trow = el('div', 'trow');
  trow.append(el('h1', 'art', st.question));
  trow.append(globeBtn(st)); // переключатель веб-ответа — всегда на странице статьи
  art.append(trow);
  const meta = el('div', 'meta'); meta.id = 'art-meta';
  art.append(meta);
  // узкий экран (≤980, содержание скрыто): вместо мета-строки и карточки
  // «Об ответе» — строка чипов с метриками; переключение выполняется только средствами CSS
  const chips = el('div', 'chips'); chips.id = 'art-chips';
  art.append(chips);
  const ans = el('div'); ans.id = 'sec-ans';
  const ansBody = el('div'); ansBody.id = 'ans-body';
  ans.append(ansBody);
  art.append(ans);
  const rest = el('div'); rest.id = 'sec-rest';
  art.append(rest);

  paintToc(st);
  paintInfobox(st);
  paintMeta(st);
  paintAnswer(st);
  if (st.phase === 'done') paintFinalSections(st);
  else {
    const sk = el('div'); sk.id = 'skels';
    const s1 = el('div', 'skel'); s1.style.width = '88%';
    const s2 = el('div', 'skel'); s2.style.width = '64%';
    sk.append(s1, s2);
    art.append(sk);
  }
  // контейнер веб-режима размещён рядом с базовыми секциями и переключается глобусом
  const web = el('div'); web.id = 'webmode'; web.hidden = true;
  art.append(web);
  if (st.webMode) applyWebMode(st); // перерисовка (например, final) сохраняет веб-режим
}

// ---------- веб-режим: глобус и центральный контент из /web/answer ----------
function globeBtn(st){
  const b = el('span', 'gicon' + (st.webMode ? ' on' : ''));
  b.id = 'gicon';
  b.setAttribute('role', 'button');
  b.setAttribute('aria-label', 'Ответ из веб-источников');
  b.setAttribute('aria-pressed', st.webMode ? 'true' : 'false');
  b.title = 'Ответ из веб-источников';
  b.tabIndex = 0;
  b.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3c2.9 2.5 4.6 5.6 4.6 9s-1.7 6.5-4.6 9c-2.9-2.5-4.6-5.6-4.6-9s1.7-6.5 4.6-9z"/></svg>';
  const run = () => toggleWebMode(st);
  b.addEventListener('click', run);
  b.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' '){ e.preventDefault(); run(); } });
  return b;
}

function toggleWebMode(st){
  st.webMode = !st.webMode;
  applyWebMode(st);
}

// показывает/прячет центральный контент по st.webMode; TOC приглушается целиком,
// инфобокс и чипы перерисовываются под режим. Вызывается и из перерисовок (viewArticle).
function applyWebMode(st){
  const on = st.webMode;
  const btn = $('#gicon');
  if (btn){
    btn.classList.toggle('on', on);
    btn.setAttribute('aria-pressed', on ? 'true' : 'false');
  }
  for (const id of ['art-meta', 'sec-ans', 'sec-rest', 'skels']){
    const n = document.getElementById(id);
    if (n) n.hidden = on;
  }
  const toc = $('#toc');
  if (toc) toc.classList.toggle('webdim', on);
  const web = $('#webmode');
  if (web){
    web.hidden = !on;
    if (on) paintWebMode(st);
  }
  // карточка «Об ответе» и чипы меняют содержимое по режиму: метрики базы ↔ веб-источники
  paintInfobox(st);
  paintChips(st);
  hideFnpop();
  const sc = document.getElementById('artscroll');
  if (on && sc) sc.scrollTop = 0; // веб-ответ читается с начала
  if (!on){ recalcSpy(); scheduleSpy(); } // возврат к базовому ответу — управление подсветкой возвращается скролл-spy
}

function paintWebMode(st){
  const box = $('#webmode');
  if (!box) return;
  clear(box);
  const w = st.web || {};
  if (w.phase === 'loading'){ // ответ ещё не получен — статичный скелет загрузки
    for (const width of ['88%', '72%', '55%']){
      const s = el('div', 'skel');
      s.style.width = width;
      box.append(s);
    }
    return;
  }
  if (w.phase === 'error'){
    box.append(el('div', 'llmerr', 'Веб-ответ не получен: ' + (w.error || 'неизвестная ошибка')));
    return;
  }
  // порядок фиксирован: жёлтая строка ошибки → текст ответа →
  // раздел «Источники» (основной — первым с бейджем); при ошибке LLM
  // структура та же, но без текста
  const d = w.data || {};
  if (d.llm_error) box.append(el('div', 'llmerr', String(d.llm_error)));
  if (d.answer) box.append(linkifiedParagraphs(d.answer));
  else if (!d.llm_error) box.append(el('p', 'p', 'Ответ из веб-источников не найден.'));
  const list = webSourceList(st);
  if (list.length){
    box.append(el('div', 'sec-h', 'Источники'));
    const sb = el('div', 'websnips');
    for (const s of list) sb.append(snippetEl(s.data, s.primary));
    box.append(sb);
  }
}

// URL веб-сниппета по любому из принятых ключей контракта
function snippetUrl(sn){
  return (sn && typeof sn === 'object') ? (sn.url || sn.href || sn.link || null) : null;
}

// Упорядоченный список веб-источников для карточек и инфобокса: основной
// (d.url) — первым с пометкой primary; если он не встретился среди сниппетов,
// добавляется синтетической карточкой, чтобы не потерять ссылку
function webSourceList(st){
  const d = (st.web && st.web.data) || {};
  const list = (Array.isArray(d.snippets) ? d.snippets : []).slice(0, 8)
    .map(sn => ({ data: sn, url: snippetUrl(sn), primary: false }));
  if (d.url){
    const i = list.findIndex(s => s.url === d.url);
    if (i >= 0){
      const [p] = list.splice(i, 1);
      p.primary = true;
      list.unshift(p);
    } else {
      list.unshift({ data: { title: d.url, url: d.url }, url: d.url, primary: true });
    }
  }
  return list;
}

// Реестр веб-источников системы — ВЕСЬ список площадок веб-контура (домены
// ddgs-поиска + научные API), НЕ источники конкретного ответа. Значения по умолчанию
// предоставляет СЕРВЕР (GET /web/sources ← ml /web_sources, единственный источник правды);
// встроенный список ниже — только резервный вариант до/без ответа сервера. Правки
// (корзина/«Добавить») хранятся в localStorage поверх значений по умолчанию. Реестр передаётся
// на сервер с каждым /web/answer: домены ищутся ddgs и русским вопросом, и
// английским переводом; строки с полем api включают-выключают научные API
const WEB_SOURCES_FALLBACK = [
  { title: 'ResearchGate', url: 'https://researchgate.net' },
  { title: 'eLibrary.ru', url: 'https://elibrary.ru' },
  { title: 'Springer Link', url: 'https://link.springer.com' },
  { title: 'Google Patents', url: 'https://patents.google.com' },
  { title: 'MDPI', url: 'https://mdpi.com' },
  { title: 'КиберЛенинка', url: 'https://cyberleninka.ru' },
  { title: 'Wiley Online Library', url: 'https://onlinelibrary.wiley.com' },
  { title: 'ScienceDirect', url: 'https://sciencedirect.com' },
  { title: 'arXiv', url: 'https://arxiv.org', api: 'arxiv' },
  { title: 'Crossref', url: 'https://search.crossref.org', api: 'crossref' },
  { title: 'Semantic Scholar', url: 'https://semanticscholar.org', api: 'semanticscholar' },
];
let WEB_SOURCES_SERVER = null; // реестр с сервера; null — ещё не получен/недоступен
const WEBSRC_LS = 'graphrag.webSources';
let webSrcFormOpen = false; // раскрыта ли форма «добавить источник»

// Загружает реестр по умолчанию с сервера (один раз при загрузке приложения);
// при недоступном сервере без сообщения используется встроенный резервный список
async function loadWebSources(){
  try {
    const data = await apiJSON('/web/sources');
    const list = Array.isArray(data.sources) ? data.sources : [];
    if (!list.length) return;
    WEB_SOURCES_SERVER = list.map(s => ({
      title: s.title || s.host,
      url: s.url || ('https://' + s.host),
      host: s.host || hostOf(s.url),
      api: s.api || null,
    }));
    // веб-карточка могла уже отрисоваться с резервным списком — обновляем
    if (S.article && S.article.webMode){ paintInfobox(S.article); paintChips(S.article); }
  } catch {}
}

// Правки реестра из localStorage: added — свои источники {title, url},
// removed — убранные корзиной URL
function webSrcOverrides(){
  try {
    const o = JSON.parse(localStorage.getItem(WEBSRC_LS)) || {};
    return { removed: o.removed || [], added: o.added || [] };
  } catch { return { removed: [], added: [] }; }
}

function webSrcSave(o){
  try { localStorage.setItem(WEBSRC_LS, JSON.stringify(o)); } catch {} // приватный режим — правки сохраняются до перезагрузки
}

// Единственная точка нормализации хоста: без www, пустая строка при некорректном URL
function hostOf(url){
  try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return ''; }
}

// Итоговый реестр: значения по умолчанию (серверные либо резервные) + добавленные, минус
// удалённые; дедупликация по URL. host/api передаются для отправки на сервер и подсветки
function webSourcesRoster(){
  const o = webSrcOverrides();
  const removed = new Set(o.removed);
  const out = [];
  const seen = new Set();
  for (const s of [...(WEB_SOURCES_SERVER || WEB_SOURCES_FALLBACK), ...o.added]){
    if (!s.url || seen.has(s.url) || removed.has(s.url)) continue;
    seen.add(s.url);
    out.push({ title: s.title || s.url, url: s.url,
               host: s.host || hostOf(s.url), api: s.api || null });
  }
  return out;
}

// Реестр для сервера: [{host}] всех строк карточки — передаётся с каждым
// вопросом в /web/answer, чтобы поиск шёл ровно по списку пользователя
function webActiveSources(){
  const out = [];
  for (const s of webSourcesRoster()){
    if (s.host) out.push({ host: s.host });
  }
  return out;
}

// Что реально сработало в текущем веб-ответе: хосты сниппетов + ветки научных
// API (по метке source). null — ответа ещё нет (не приглушать реестр)
function webUsedKeys(st){
  const w = st.web || {};
  if (w.phase !== 'done') return null;
  const d = w.data || {};
  const hosts = new Set();
  const apis = new Set();
  const push = u => { const h = hostOf(u); if (h) hosts.add(h); };
  for (const sn of (Array.isArray(d.snippets) ? d.snippets : [])){
    if (sn && sn.source && sn.source !== 'ddgs') apis.add(sn.source);
    const u = snippetUrl(sn);
    if (u) push(u);
  }
  if (d.url) push(d.url);
  return { hosts, apis };
}

// Использована ли площадка реестра в текущем ответе: совпадение ветки API
// (поле api строки — приходит с реестром от сервера) или хоста (с учётом
// поддоменов — сниппет www.researchgate.net ≙ researchgate.net)
function webSrcUsed(entry, used){
  if (!used) return true; // данных об использовании нет — все строки обычные
  if (entry.api && used.apis.has(entry.api)) return true;
  const host = entry.host || hostOf(entry.url);
  if (!host) return false;
  for (const h of used.hosts){
    if (h === host || h.endsWith('.' + host) || host.endsWith('.' + h)) return true;
  }
  return false;
}

// текст веб-ответа: http(s)-ссылки кликабельны, всё остальное — textContent
const URL_RE = /https?:\/\/[^\s<>"'«»()\[\]]+/g;
function linkifiedParagraphs(text){
  const frag = document.createDocumentFragment();
  const parts = String(text || '').split(/\n{2,}/).filter(p => p.trim());
  for (const part of parts.length ? parts : ['']){
    const p = el('p', 'p');
    URL_RE.lastIndex = 0;
    let last = 0, m;
    while ((m = URL_RE.exec(part)) !== null){
      if (m.index > last) p.append(document.createTextNode(part.slice(last, m.index)));
      const u = m[0].replace(/[.,;:!?]+$/, ''); // хвостовая пунктуация — не часть ссылки
      p.append(extLink(u, trunc(u, 80)));
      last = m.index + u.length;
    }
    if (last < part.length) p.append(document.createTextNode(part.slice(last)));
    frag.append(p);
  }
  return frag;
}

// какие секции уже «есть» (для оглавления)
function sectionCounts(st){
  const r = respOf(st);
  const done = st.phase === 'done';
  const partial = (r.evidence_status === 'partial');
  return {
    ans: 1,
    conf: (r.contradictions || []).length,
    gaps: done ? (r.gaps || []).length : 0,
    hyp: done ? (r.hypotheses || []).length : 0,
    facts: (r.experiments || []).length,
    rel: partial ? (r.related_experiments || []).length : 0,
    notes: st.notes.length,
  };
}

function paintToc(st){
  const toc = $('#toc');
  if (!toc) return;
  clear(toc);
  toc.append(el('div', 't', 'Содержание'));
  const counts = sectionCounts(st);
  for (const [key, title] of TOC_SECTIONS){
    const n = counts[key];
    // полный список секций виден всегда (и после финала): пустые — приглушённые .off без перехода
    const b = el('button', (n || key === 'ans') ? '' : 'off');
    b.dataset.key = key;
    b.append(document.createTextNode(title + ' '));
    if (n && key !== 'ans') b.append(el('i', null, String(n)));
    if (n || key === 'ans') b.addEventListener('click', () => tocNavigate(key));
    toc.append(b);
  }
  // перерисовка (evidence/final) сбрасывает и DOM оглавления, и позиции секций:
  // пересчитываем кэш и возвращаем маркер — либо цель клика, либо по текущему скроллу
  recalcSpy();
  if (SPY.navKey !== null){
    SPY.activeKey = SPY.navKey;
    applyTocActive();
  } else {
    SPY.activeKey = null; // DOM новый — маркер надо проставить безусловно
    updateTocSpy();
  }
}

// ---------- скролл-spy оглавления ----------
// Активная секция = последний заголовок, чей верх поднялся выше «линии чтения»
// (верх скролл-области + SPY_LINE px); до первой секции активен «Ответ»; упор в самый
// низ — последняя секция (иначе короткие секции у дна недостижимы). Позиции секций
// кэшируются дешёвым offsetTop (offsetParent секций — сама <article>, ей выставлен
// position:relative) и пересчитываются на resize и после каждой перерисовки,
// а НЕ на каждый scroll-тик. Подсветка меняется только при реальной смене ключа.
const SPY_LINE = 100;   // «линия чтения»: отступ от верха скролл-области
const SPY_ANCHOR = 14;  // зазор цели клика = scroll-margin-top якорей
const SPY = {
  keys: [], tops: [],   // кэш секций в координатах скролл-области
  narrow: false,        // режим на момент пересчёта (узкий = скроллит страница)
  activeKey: null,      // текущий подсвеченный пункт оглавления
  navKey: null,         // клик-навигация в процессе: spy не перебивает подсветку
  navTarget: 0,         // scrollTop — цель плавной прокрутки
  navTimer: 0,          // страховочный таймаут снятия флага навигации
  navDist: 0,           // остаток пути до цели (для продления страховки при прогрессе)
};
const SPY_NAV_TIMEOUT = 700; // мс без прогресса к цели — снимаем флаг навигации

function spyIsNarrow(){ return matchMedia('(max-width:980px)').matches; }
// скролл-контейнер статьи на широком экране — обёртка «текст + инфобокс»
function artScroller(){ return document.getElementById('artscroll'); }

function recalcSpy(){
  const art = document.getElementById('artbody');
  if (!art) return;
  SPY.narrow = spyIsNarrow();
  SPY.keys = []; SPY.tops = [];
  // на узком экране скроллит страница — переводим offsetTop в координаты документа;
  // на широком — в координаты контента скролл-обёртки (top статьи внутри неё)
  let base;
  if (SPY.narrow) base = art.getBoundingClientRect().top + window.scrollY;
  else {
    const sc = artScroller();
    base = sc ? art.getBoundingClientRect().top - sc.getBoundingClientRect().top + sc.scrollTop : 0;
  }
  for (const s of art.querySelectorAll('#sec-rest > div[id^="sec-"]')){
    SPY.keys.push(s.id.slice(4));
    SPY.tops.push(base + s.offsetTop);
  }
}

let spyRAF = 0;
function scheduleSpy(){
  if (spyRAF) return;
  spyRAF = requestAnimationFrame(() => { spyRAF = 0; updateTocSpy(); });
}

// текущее положение скролл-области: [scrollTop, высота вьюпорта, высота контента, линия чтения]
function spyScrollPos(art){
  if (SPY.narrow){
    const hdrH = ($('#hdr') || {}).offsetHeight || 0; // верх области — под липкой шапкой
    return [window.scrollY, window.innerHeight, document.documentElement.scrollHeight,
      window.scrollY + hdrH + SPY_LINE];
  }
  const sc = artScroller() || art;
  return [sc.scrollTop, sc.clientHeight, sc.scrollHeight, sc.scrollTop + SPY_LINE];
}

function updateTocSpy(){
  if (routeName() !== 'article') return;
  if (S.article && S.article.webMode) return; // веб-режим: секции базы скрыты, TOC приглушён
  const art = document.getElementById('artbody');
  if (!art || !$('#toc')) return;
  if (SPY.narrow !== spyIsNarrow()) recalcSpy(); // сменился режим — кэш в других координатах
  const [pos, viewH, contentH, line] = spyScrollPos(art);
  if (SPY.navKey !== null){
    // идёт навигация по клику: подсветка уже установлена на целевой пункт, spy ожидает
    // завершения прокрутки; пока она приближается к цели — продлеваем страховочный таймаут
    const dist = Math.abs(pos - SPY.navTarget);
    if (dist <= 4) endTocNav();
    else if (dist < SPY.navDist){
      SPY.navDist = dist;
      clearTimeout(SPY.navTimer);
      SPY.navTimer = setTimeout(endTocNav, SPY_NAV_TIMEOUT);
    }
    return;
  }
  let active = 'ans';
  if (contentH > viewH && pos + viewH >= contentH - 4 && SPY.keys.length){
    active = SPY.keys[SPY.keys.length - 1]; // упор в самый низ — последняя секция
  } else {
    for (let i = 0; i < SPY.tops.length; i++) if (SPY.tops[i] <= line) active = SPY.keys[i];
  }
  setTocActive(active);
}

function setTocActive(key){
  if (key === SPY.activeKey) return; // без лишних перерисовок: classList изменяется только при смене ключа
  SPY.activeKey = key;
  applyTocActive();
}
// безусловная простановка маркера (нужна после полной перестройки оглавления)
function applyTocActive(){
  const toc = $('#toc');
  if (!toc) return;
  for (const b of toc.querySelectorAll('button'))
    b.classList.toggle('on', b.dataset.key === SPY.activeKey && !b.classList.contains('off'));
}

// Клик по пункту: подсветка ставится мгновенно и не перебивается spy'ем, пока идёт
// плавный скролл; флаг снимается по прибытии к цели или страховочным таймаутом ~700мс.
function tocNavigate(key){
  const art = document.getElementById('artbody');
  if (!art) return;
  if (S.article && S.article.webMode) return; // в веб-режиме содержание некликабельно
  recalcSpy(); // позиции могли устареть (стрим дорисовывает контент)
  const [, viewH, contentH] = spyScrollPos(art);
  const hdrH = SPY.narrow ? (($('#hdr') || {}).offsetHeight || 0) : 0;
  const i = SPY.keys.indexOf(key);
  let top;
  if (i === -1) // «Ответ» (или секция ещё не отрисована) — к началу статьи
    top = SPY.narrow ? art.getBoundingClientRect().top + window.scrollY - hdrH - SPY_ANCHOR : 0;
  else
    top = SPY.tops[i] - hdrH - SPY_ANCHOR;
  top = Math.max(0, Math.min(Math.round(top), Math.max(0, contentH - viewH)));
  setTocActive(key);
  clearTimeout(SPY.navTimer);
  SPY.navKey = key;
  SPY.navTarget = top;
  SPY.navDist = Infinity;
  SPY.navTimer = setTimeout(endTocNav, SPY_NAV_TIMEOUT);
  const opts = { top, behavior: REDUCED ? 'auto' : 'smooth' };
  if (SPY.narrow) window.scrollTo(opts);
  else (artScroller() || art).scrollTo(opts);
}
function endTocNav(){
  clearTimeout(SPY.navTimer);
  SPY.navKey = null;
  // подсветка остаётся на выбранном пункте; следующее событие прокрутки вернёт управление скролл-spy
}

// Скролл узкого экрана (page-скролл): один постоянный слушатель на window с guard'ом
// маршрута внутри updateTocSpy — снимать его не нужно, утечек нет. Скролл широкого
// экрана слушает обёртка #artscroll (artwrap) — слушатель удаляется вместе с ней.
window.addEventListener('scroll', scheduleSpy, { passive: true });
// resize меняет и позиции секций, и режим (узкий/широкий) — пересчёт кэша
window.addEventListener('resize', () => {
  if (routeName() !== 'article') return;
  recalcSpy();
  scheduleSpy();
});

function paintMeta(st){
  const meta = $('#art-meta');
  if (!meta) return;
  clear(meta);
  const r = respOf(st);
  const nDocs = uniqueDocsCount(st);
  if (nDocs){
    const b = el('button', 'mlink', 'Собрано по ' + nDocs + ' ' + plural(nDocs, 'документу', 'документам', 'документам') + ' корпуса');
    b.addEventListener('click', () => openSources(null));
    meta.append(b);
    meta.append(' · ');
  }
  // ссылка на граф-оверлей активна, только когда графу есть что показать; при пустом
  // графе (nodes 0 — например, «косвенный» финал обнулил graph) — обычный приглушённый
  // текст без подчёркивания и клика. Состояние пересчитывается на каждом paintMeta
  // (evidence и final): к финалу граф может опустеть.
  const modeText = r.pipeline_mode === 'fast' ? 'быстрый ответ по фрагментам' : 'полный разбор с графом';
  if (displayGraph(st).graph.nodes.length){
    const mode = el('button', 'mlink', modeText);
    mode.addEventListener('click', () => openGraphOverlay(st));
    meta.append(mode);
  } else {
    meta.append(el('span', null, modeText));
  }
  // готовый ответ суффикса не получает: фактического таймстемпа обновления в данных
  // нет; во время генерации выводится статус генерации
  if (st.phase !== 'done') meta.append(' · собирается сейчас');
  paintChips(st); // чипы обновляются в те же моменты, что мета-строка (evidence и final)
}

// Чипы метрик для узкого экрана (≤980px): те же значения, что в карточке
// «Об ответе», размещённые одной строкой под заголовком. Видимость управляется CSS —
// рисуем всегда, показывается только когда карточка и мета-строка скрыты
function paintChips(st){
  const wrap = $('#art-chips');
  if (!wrap) return;
  clear(wrap);
  // веб-режим: метрики базового ответа здесь не соответствовали бы содержимому — вместо них один чип
  // с числом источников реестра (то же, что мини-таблица в карточке «Об ответе»)
  if (st.webMode){
    const c = el('span', 'chip');
    const n = String(webSourcesRoster().length);
    c.append('источников ');
    c.append(el('b', null, n));
    wrap.append(c);
    return;
  }
  const r = respOf(st);
  const has = !!(st.evidence || st.final);
  const chip = (label, value) => {
    const c = el('span', 'chip');
    c.append(label + ' ');
    c.append(el('b', null, value));
    wrap.append(c);
    return c;
  };
  const activate = (c, open, role) => {
    c.classList.add('act');
    c.setAttribute('role', role);
    c.tabIndex = 0;
    c.addEventListener('click', open);
    c.addEventListener('keydown', e => { if (e.key === 'Enter') open(); });
  };
  chip('уверенность', has && r.confidence != null ? pct(r.confidence) : '—');
  chip('научность', has && r.scientific_share != null ? pct(r.scientific_share) : '—');
  const srcCount = srcTotal(st, r);
  const src = chip('источники', has ? String(srcCount) : '—');
  if (has && srcCount > 0) activate(src, () => openSources(null), 'link');
  const dg = displayGraph(st);
  const g = dg.graph;
  const gChip = chip(dg.related ? 'граф смежных' : 'граф',
    has ? (g.nodes || []).length + '/' + (g.edges || []).length : '—');
  if ((g.nodes || []).length){
    activate(gChip, () => openGraphOverlay(st), 'button');
    gChip.append(' →'); // стрелка — подсказка кликабельности (макет «граф 61/85 →»)
  }
}

// Строка реестра: кликабельное название + корзина. used=false — площадка не
// дала источников текущему ответу: строка приглушается, но остаётся интерактивной
function webSrcRow(st, s, used){
  const tr = el('tr', used ? null : 'dim');
  const name = el('td', 'name');
  const a = extLink(s.url, trunc(s.title, 60));
  a.title = s.url;
  name.append(a);
  tr.append(name);

  const act = el('td', 'act');
  const del = dockBtn('trash', 'убрать из списка', _SVG_TRASH);
  del.addEventListener('click', () => {
    const o = webSrcOverrides();
    o.removed = [...o.removed.filter(u => u !== s.url), s.url];
    o.added = o.added.filter(x => x.url !== s.url); // пользовательский источник удаляется полностью
    webSrcSave(o);
    paintInfobox(st);
    paintChips(st);
  });
  act.append(del);
  tr.append(act);
  return tr;
}

// Форма «добавить источник»: ссылка + название, Enter добавляет. Источник
// попадает в реестр (localStorage), сохраняется между ответами и передаётся в поиск
function webSrcForm(st){
  const form = el('div', 'srcform');
  const urlIn = el('input');
  urlIn.placeholder = 'ссылка (https://…)';
  const nameIn = el('input');
  nameIn.placeholder = 'название источника';
  const frow = el('div', 'frow');
  const err = el('div', 'ferr');
  const add = el('button', 'fadd', 'Добавить');
  const cancel = el('button', 'fcancel', 'отмена');
  const submit = () => {
    let u = urlIn.value.trim();
    if (u && !/^https?:\/\//i.test(u)) u = 'https://' + u; // домен без схемы дополняем схемой
    const host = hostOf(u);
    if (!host || !host.includes('.')){ err.textContent = 'нужна корректная ссылка'; return; }
    const o = webSrcOverrides();
    o.added = [...o.added.filter(x => x.url !== u),
               { title: nameIn.value.trim() || host, url: u }];
    o.removed = o.removed.filter(x => x !== u); // повторное добавление убранного возвращает строку
    webSrcSave(o);
    webSrcFormOpen = false;
    paintInfobox(st);
    paintChips(st);
  };
  add.addEventListener('click', submit);
  const onEnter = e => { if (e.key === 'Enter') submit(); };
  urlIn.addEventListener('keydown', onEnter);
  nameIn.addEventListener('keydown', onEnter);
  cancel.addEventListener('click', () => { webSrcFormOpen = false; paintInfobox(st); });
  frow.append(err, add, cancel);
  form.append(urlIn, nameIn, frow);
  return form;
}

function paintInfobox(st){
  const box = $('#infobox');
  if (!box) return;
  clear(box);
  const ih = el('div', 'ih', 'Об ответе');
  box.append(ih);
  // веб-режим: вместо метрик базы — РЕЕСТР веб-источников системы (весь список
  // площадок поиска, не источники конкретного ответа): кликабельные названия
  // и корзина; использованные в текущем ответе площадки отображаются обычной яркостью,
  // прочие приглушены. Вместо заголовка колонки — строка «Добавить» со значком «+»,
  // она же открывает форму. Реестр не зависит от фазы веб-ответа
  if (st.webMode){
    const toggleForm = () => {
      webSrcFormOpen = !webSrcFormOpen;
      paintInfobox(st);
      const inp = box.querySelector('.srcform input');
      if (inp) inp.focus();
    };
    const t = el('table', 'dlist');
    const head = el('tr');
    const thAdd = el('th');
    const addBtn = el('button', 'addlbl', 'Добавить');
    addBtn.addEventListener('click', toggleForm);
    thAdd.append(addBtn);
    const thPlus = el('th', 'act');
    const plus = el('button', 'ic-btn');
    plus.title = 'добавить источник';
    plus.innerHTML = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 5v14M5 12h14"/></svg>';
    plus.addEventListener('click', toggleForm);
    thPlus.append(plus);
    head.append(thAdd, thPlus);
    t.append(head);
    if (webSrcFormOpen){
      const ftr = el('tr');
      const ftd = el('td');
      ftd.colSpan = 2;
      ftd.style.padding = '0';
      ftd.append(webSrcForm(st));
      ftr.append(ftd);
      t.append(ftr);
    }
    const list = webSourcesRoster();
    if (!list.length){
      const etr = el('tr');
      const etd = el('td');
      etd.colSpan = 2;
      etd.append(el('span', 'k', 'источников нет — добавьте первый'));
      etr.append(etd);
      t.append(etr);
    }
    // подсветка: выделяются площадки, давшие источники текущему ответу,
    // остальные приглушены (но кликабельны и редактируемы); до ответа — все обычные
    const used = webUsedKeys(st);
    for (const s of list) t.append(webSrcRow(st, s, webSrcUsed(s, used)));
    box.append(t);
    return;
  }
  const r = respOf(st);
  // состав плашки фиксирован с первого мгновения: до события evidence все значения —
  // приглушённые «—», дальше только подставляем данные, не перестраивая структуру
  const has = !!(st.evidence || st.final);
  const addRow = (k, v, vcls) => {
    const row = el('div', 'row');
    row.append(el('span', 'k', k), el('span', 'v' + (vcls ? ' ' + vcls : ''), v));
    box.append(row);
    return row;
  };
  // все строки видимы всегда: нераспознанный показатель (null) — приглушённое «—»,
  // фактический ноль остаётся нулём (0 %, 0, 0 / 0).
  // Инфобокс показывает ПОЛНУЮ информацию без фильтров и заполняется уже во время
  // генерации: значения появляются с события evidence. Финал может лишь УВЕЛИЧИТЬ
  // «Источники»/«Научность» (добавляет процитированное сверх топ-12, чтобы сноски
  // резолвились) — значения только увеличиваются, поэтому активное заполнение оставляем.
  const confKnown = has && r.confidence != null;
  addRow('Уверенность', confKnown ? pct(r.confidence) : '—', confKnown ? 'conf' : 'na');
  const sciKnown = has && r.scientific_share != null;
  addRow('Научность', sciKnown ? pct(r.scientific_share) : '—', sciKnown ? 'sci' : 'na');
  const srcCount = srcTotal(st, r);
  // «Источники» кликабельны, только когда источников > 0: ведут на тот же #/sources,
  // что и мета-ссылка «Собрано по N документам корпуса»; при 0 — инертная строка
  const srcRow = addRow('Источники', has ? String(srcCount) : '—', has ? null : 'na');
  if (has && srcCount > 0){
    srcRow.classList.add('lnk');
    srcRow.setAttribute('role', 'link');
    srcRow.tabIndex = 0;
    const openSrc = () => openSources(null);
    srcRow.addEventListener('click', openSrc);
    srcRow.addEventListener('keydown', e => { if (e.key === 'Enter') openSrc(); });
  }
  const dg = displayGraph(st);
  const g = dg.graph;
  addRow('Узлы / связи',
    has ? ((g.nodes || []).length + ' / ' + (g.edges || []).length) : '—',
    has ? null : 'na');

  // зона мини-графа присутствует всегда; до данных — статичный «—» без анимаций.
  // Смежный граф (partial-ответ) подписан явно — не выдаётся за прямой
  const mg = el('div', 'minigraph');
  const cap = el('div', 'cap');
  cap.append(el('span', null, dg.related ? 'Граф смежных данных' : 'Граф'));
  if ((g.nodes || []).length){
    const expand = el('button', null, 'развернуть →');
    expand.addEventListener('click', () => openGraphOverlay(st));
    cap.append(expand);
  }
  mg.append(cap);
  if ((g.nodes || []).length){
    const svg = graphSVG(g, 10, 220, true);
    svg.addEventListener('click', () => openGraphOverlay(st));
    mg.append(svg);
  } else {
    const ph = el('div', null, '—');
    ph.style.cssText = 'height:72px;display:flex;align-items:center;justify-content:center;color:var(--w-dim)';
    mg.append(ph);
  }
  box.append(mg);
}

function paintAnswer(st){
  const body = $('#ans-body');
  if (!body) return;
  clear(body);
  if (st.phase === 'done'){
    const r = st.final || {};
    if (r.llm_error) body.append(el('div', 'llmerr', 'Генерация деградировала: ' + r.llm_error));
    body.append(richParagraphs(st, r.summary || ''));
    return;
  }
  const [shown] = splitPending(st.answerRaw);
  const frag = richParagraphs(st, shown);
  const lastP = frag.lastChild;
  body.append(frag);
  (lastP || body).append(el('span', 'cursor'));
}

function paintFinalSections(st){
  const r = st.final || {};
  // сноски строим заново с чистой нумерацией: финальный summary — источник истины
  st.noteMap = new Map();
  st.notes = [];
  paintAnswer(st);

  const rest = $('#sec-rest');
  if (!rest) return;
  clear(rest);
  const sec = (key, title) => {
    const w = el('div'); w.id = 'sec-' + key;
    w.append(el('div', 'sec-h', title));
    rest.append(w);
    return w;
  };

  if ((r.contradictions || []).length){
    const w = sec('conf', 'Противоречия');
    for (const c of r.contradictions){
      const d = el('div', 'conflict');
      d.append(el('span', 'flag', '⚑'));
      appendRich(st, d, String(c));
      w.append(d);
    }
  }
  if ((r.gaps || []).length){
    const w = sec('gaps', 'Пробелы');
    for (const gp of r.gaps){
      const d = el('div', 'gap');
      appendRich(st, d, String(gp));
      w.append(d);
    }
  }
  if ((r.hypotheses || []).length){
    const w = sec('hyp', 'Гипотезы');
    for (const h of r.hypotheses){
      const p = el('p', 'hyp');
      p.append(el('span', 'mark', 'Косвенно'));
      appendRich(st, p, String(h));
      w.append(p);
    }
  }
  if ((r.experiments || []).length){
    const w = sec('facts', 'Прямые факты и эксперименты');
    w.append(expTable(st, r.experiments));
  }
  if (r.evidence_status === 'partial' && (r.related_experiments || []).length){
    const w = sec('rel', 'Смежные данные');
    w.append(expTable(st, r.related_experiments));
  }
  // секции «Внешние источники» в базовом ответе нет: веб-ответ доступен
  // через переключатель-глобус (final.web_answer в контракте отсутствует)
  if (st.notes.length){
    const w = sec('notes', 'Источники');
    const ol = el('ol', 'refs');
    for (const note of st.notes) ol.append(noteLi(st, note));
    w.append(ol);
  }
  paintToc(st);
  paintInfobox(st);
  paintMeta(st);
}

function snippetEl(sn, primary){
  const d = el('div', 'sn');
  if (typeof sn === 'string'){ d.textContent = sn; return d; }
  const url = snippetUrl(sn);
  const title = sn.title || url || 'источник';
  const body = sn.snippet || sn.body || sn.text || '';
  if (url){
    d.append(extLink(url, trunc(title, 90)));
  } else d.append(el('b', null, trunc(title, 90)));
  // год публикации из научных API (контракт «год статьи»): year или date рядом с заголовком
  const yr = sn.year != null ? sn.year : sn.date;
  if (yr != null && String(yr) !== '') d.append(el('span', 'yr', ' · ' + yr));
  if (primary) d.append(el('span', 'primetag', 'основной')); // бейдж основного источника
  if (body){ d.append(document.createElement('br')); d.append(document.createTextNode(trunc(body, 220))); }
  // Маршрут к полному тексту для источников с DOI: официальная страница —
  // ссылка заголовка (шаг 1, там нередко open access); платный доступ → ResearchGate
  // (авторские копии, шаг 2); Sci-Hub — запасной, в основном для статей
  // до ~2021 (коллекция заморожена). Переход — действие пользователя
  const doi = url && (url.match(/10\.\d{4,9}\/[^\s?#]+/) || [])[0];
  if (doi){
    const ft = el('div', 'ft');
    ft.append('полный текст: ');
    const rg = extLink('https://www.researchgate.net/search?q=' + encodeURIComponent(sn.title || doi), 'ResearchGate');
    rg.title = 'поиск авторской копии по названию';
    const sh = extLink('https://sci-hub.ru/' + doi, 'Sci-Hub');
    sh.title = 'запасной вариант: надёжен в основном для статей до ~2021';
    ft.append(rg, ' · ', sh);
    d.append(ft);
  }
  return d;
}

function noteLi(st, note){
  const li = el('li');
  if (note.ref && note.ref.document_id){
    const doc = el('span', 'doc', docName(note.ref.document_id));
    doc.tabIndex = 0;
    doc.setAttribute('role', 'link');
    const open = () => openSources(note.id);
    doc.addEventListener('click', open);
    doc.addEventListener('keydown', e => { if (e.key === 'Enter') open(); });
    li.append(doc);
    const yr = docYear(note.ref.document_id); // год издания рядом с именем файла (контракт «год статьи»)
    if (yr != null) li.append(' (' + yr + ')');
    li.append(', ' + fragLoc(note.ref.document_id, note.ref.page));
    const sci = sciLabel(note.ref.document_id);
    if (sci) li.append(' · ' + sci);
  } else if (/^https?:\/\//i.test(note.id || '')){
    // страховка: цитата не резолвится, но это URL — рендерим кликабельную ссылку
    li.append(extLink(note.id, trunc(note.id, 90)));
  } else {
    li.append('фрагмент вне списка источников ответа');
  }
  if (note.quote){
    li.append(' — ');
    li.append(el('q', null, wrapQuote(note.quote, 220)));
  }
  return li;
}

function expTable(st, rows){
  const wrap = el('div', 'tblwrap');
  const t = el('table', 'exp');
  const head = el('tr');
  for (const h of ['Материал', 'Процесс', 'T, °C', 'Свойство', 'Эффект', 'Лаб.', 'Ист.']) head.append(el('th', null, h));
  t.append(head);
  for (const row of rows){
    const tr = el('tr');
    tr.append(el('td', null, row.material || '—'));
    tr.append(el('td', null, row.process || '—'));
    tr.append(el('td', null, row.temperature_c != null ? String(row.temperature_c) : '—'));
    tr.append(el('td', null, row.property || '—'));
    const eff = String(row.effect || '—');
    const low = eff.toLowerCase();
    const up = low.startsWith('рост') || low.startsWith('increase') || low.startsWith('увелич');
    const down = low.startsWith('сниж') || low.startsWith('decrease') || low.startsWith('умень') || low.startsWith('паден');
    const td = el('td', up ? 'up' : (down ? 'down' : null));
    td.textContent = (up ? '▲ ' : down ? '▼ ' : '') + eff;
    tr.append(td);
    tr.append(el('td', null, row.lab && row.lab !== 'Unknown Lab' ? row.lab : '—'));
    const tdRef = el('td');
    const note = noteForSource(st, row.source);
    if (note) tdRef.append(supFor(st, note));
    tr.append(tdRef);
    t.append(tr);
  }
  wrap.append(t);
  return wrap;
}

// ---------- вопрос вне предметной области и ошибка — единое оформление ----------
function paintOfftopic(view){
  const o = el('div', 'oops');
  o.append(el('div', 'glyph', '∅'));
  o.append(el('h3', null, 'Такой статьи в энциклопедии нет'));
  o.append(el('p', null,
    'Вопрос не похож на запрос к базе знаний R&D, поэтому полный поиск не запускался. ' +
    'Здесь отвечают про материалы, процессы, параметры, эксперименты и источники.'));

}

function paintAskError(view, st){
  const o = el('div', 'oops');
  o.append(el('div', 'glyph', '⚠'));
  o.append(el('h3', null, 'Ответ не собрался'));

  view.append(o);
}

// Попап сноски
// ==================================================================
let fnpopHideTimer = null;

function showFnpop(refEl){
  const st = S.article;
  if (!st) return;
  const note = st.notes[Number(refEl.dataset.note)];
  if (!note) return;
  const pop = $('#fnpop');
  clear(pop);
  if (note.ref && note.ref.document_id){
    pop.append(el('div', 'd', docName(note.ref.document_id)));
    if (note.quote) pop.append(el('q', null, wrapQuote(note.quote, 300)));
    const ft = el('div', 'ft');
    const locBits = [fragLoc(note.ref.document_id, note.ref.page)];
    const sci = sciLabel(note.ref.document_id);
    if (sci) locBits.push(sci);
    ft.append(el('span', null, locBits.join(' · ')));
    const open = el('button', null, 'открыть источник →');
    open.addEventListener('click', () => { hideFnpop(); openSources(note.id); });
    ft.append(open);
    pop.append(ft);
  } else {
    pop.append(el('div', 'd', 'Источник не найден в списке ответа'));
    if (note.quote) pop.append(el('q', null, wrapQuote(note.quote, 300)));
  }
  pop.hidden = false;
  // позиционирование у сноски без выхода за края окна
  const r = refEl.getBoundingClientRect();
  const pw = pop.offsetWidth, ph = pop.offsetHeight;
  let left = r.left + window.scrollX - 20;
  left = Math.max(8 + window.scrollX, Math.min(left, window.scrollX + document.documentElement.clientWidth - pw - 8));
  let top = r.bottom + window.scrollY + 8;
  if (r.bottom + ph + 16 > window.innerHeight) top = r.top + window.scrollY - ph - 8;
  pop.style.left = left + 'px';
  pop.style.top = Math.max(window.scrollY + 8, top) + 'px';
}
function hideFnpop(){ const p = $('#fnpop'); if (p) p.hidden = true; }
function scheduleHideFnpop(){
  clearTimeout(fnpopHideTimer);
  fnpopHideTimer = setTimeout(hideFnpop, 250);
}
document.addEventListener('mouseover', e => {
  const ref = e.target.closest && e.target.closest('.ref[data-note]');
  if (ref){ clearTimeout(fnpopHideTimer); showFnpop(ref); }
  else if (e.target.closest && e.target.closest('#fnpop')) clearTimeout(fnpopHideTimer);
});
document.addEventListener('mouseout', e => {
  if ((e.target.closest && (e.target.closest('.ref[data-note]') || e.target.closest('#fnpop'))))
    scheduleHideFnpop();
});
document.addEventListener('click', e => {
  const ref = e.target.closest && e.target.closest('.ref[data-note]');
  if (ref){ e.preventDefault(); clearTimeout(fnpopHideTimer); showFnpop(ref); return; }
  if (!(e.target.closest && e.target.closest('#fnpop'))) hideFnpop();
});
document.addEventListener('focusin', e => {
  const ref = e.target.closest && e.target.closest('.ref[data-note]');
  if (ref) showFnpop(ref);
});

// ==================================================================
// Граф по контракту КГ: продольная раскладка слева-направо
// [Material/Process/Equipment/Condition] → [Claim] → [Document]
// ==================================================================
function nodeColor(type){
  const t = String(type || '').toLowerCase();
  if (t.includes('material'))  return 'var(--w-link)';       // голубой — исходные материалы
  if (t.includes('process') || t.includes('equipment') || t.includes('condition'))
    return '#4a648c';                                        // тёмно-синий приглушённый — процесс/оборудование/условие
  if (t.includes('claim'))     return '#5b6672';             // серый — утверждение
  if (t.includes('document'))  return '#20272f';             // тёмный — документ-источник
  return '#5b6672';                                          // неизвестный тип трактуем как Claim (серый)
}
// колонка по типу узла (контракт КГ):
//   0 — вход: Material/Process/Equipment/Condition
//   2 — Document (правый край)
//   1 — Claim и любой неизвестный тип (в т.ч. старые Property/Effect payload'ы)
const GRAPH_COL_LEFT  = ['material', 'process', 'equipment', 'condition'];
function graphColumn(type){
  const t = String(type || '').toLowerCase();
  if (GRAPH_COL_LEFT.some(k => t.includes(k))) return 0;
  if (t.includes('document')) return 2;
  return 1; // Claim и неизвестные типы — в центральную колонку, рендеринг не прерывается
}
// mini=true — компакт для инфобокса (подпись под узлом, масштаб под ширину колонки);
// mini=false — оверлей (подпись справа, пиксельный размер: высокий граф скроллится в панели)
function graphSVG(graph, maxN, w, mini){
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('role', 'img');
  svg.setAttribute('aria-label', 'граф окрестности ответа');
  const nodes = (graph.nodes || []).slice(0, maxN);
  if (!nodes.length){ svg.setAttribute('viewBox', '0 0 ' + w + ' 40'); return svg; }

  // раскладка по колонкам типа; пустые колонки схлопываются
  const byCol = [[], [], []];
  for (const n of nodes) byCol[graphColumn(n.type)].push(n);
  const cols = byCol.filter(c => c.length);

  const rowH = mini ? 30 : 46;
  const padY = mini ? 14 : 28;
  const maxRows = Math.max.apply(null, cols.map(c => c.length));
  const h = padY * 2 + maxRows * rowH;
  svg.setAttribute('viewBox', '0 0 ' + w + ' ' + h);
  if (mini) svg.setAttribute('width', '100%');
  else { svg.setAttribute('width', String(w)); svg.setAttribute('height', String(h)); }

  const padX = mini ? 8 : 30;
  const band = (w - padX * 2) / cols.length;
  const pos = new Map(); // node.id -> [x, y]
  cols.forEach((col, ci) => {
    // в мини узел по центру полосы (подпись под ним), в оверлее — у левого края (подпись справа)
    const x = padX + band * ci + (mini ? band / 2 : 14);
    col.forEach((n, ri) => {
      pos.set(n.id, [x, h / 2 + (ri - (col.length - 1) / 2) * rowH]);
    });
  });

  const r = mini ? 4 : 6;
  for (const e of (graph.edges || [])){
    if (!pos.has(e.source) || !pos.has(e.target)) continue;
    let [x1, y1] = pos.get(e.source), [x2, y2] = pos.get(e.target);
    if (x2 < x1){ const t = [x1, y1]; [x1, y1] = [x2, y2]; [x2, y2] = t; } // рисуем всегда слева-направо
    const p = document.createElementNS(ns, 'path');
    const dx = Math.max((x2 - x1) / 2, mini ? 10 : 26); // внутри одной колонки — небольшая дуга
    p.setAttribute('d', 'M' + x1.toFixed(1) + ' ' + y1.toFixed(1)
      + ' C' + (x1 + dx).toFixed(1) + ' ' + y1.toFixed(1)
      + ' ' + (x2 - dx).toFixed(1) + ' ' + y2.toFixed(1)
      + ' ' + x2.toFixed(1) + ' ' + y2.toFixed(1));
    p.setAttribute('fill', 'none');
    p.style.stroke = 'var(--w-line2)';
    // ховер-подсветка (только в оверлее): по data-source/target находим инцидентные рёбра
    p.setAttribute('data-source', e.source);
    p.setAttribute('data-target', e.target);
    svg.append(p);
  }

  for (const col of cols){
    for (const n of col){
      const [x, y] = pos.get(n.id);
      const g = document.createElementNS(ns, 'g');
      g.setAttribute('data-id', n.id); // ключ для ховер-подсветки инцидентных рёбер и соседей
      const title = document.createElementNS(ns, 'title');
      title.textContent = (n.label || n.id) + (n.type ? ' · ' + n.type : '');
      g.append(title);
      const c = document.createElementNS(ns, 'circle');
      c.setAttribute('cx', x.toFixed(1)); c.setAttribute('cy', y.toFixed(1));
      c.setAttribute('r', String(String(n.type || '').toLowerCase().includes('material') ? r + 1 : r));
      c.style.fill = nodeColor(n.type);
      if (!mini) c.setAttribute('stroke-width', '2'); // видимая обводка при ховер-подсветке
      g.append(c);
      const t = document.createElementNS(ns, 'text');
      if (mini){
        t.setAttribute('x', x.toFixed(1));
        t.setAttribute('y', (y + r + 8.5).toFixed(1));
        t.setAttribute('text-anchor', 'middle');
        t.setAttribute('font-size', '6.5');
        t.textContent = trunc(n.label || n.id, 12);
      } else {
        t.setAttribute('x', (x + r + 7).toFixed(1));
        t.setAttribute('y', (y + 3.5).toFixed(1));
        t.setAttribute('font-size', '11');
        // в оверлее полоса колонки ~290px — подписи длиннее, чтобы не резать «Конвертерный шл…»
        t.textContent = trunc(n.label || n.id, 34);
      }
      t.style.fill = 'var(--w-dim)';
      g.append(t);
      svg.append(g);
    }
  }
  if (!mini) attachGraphHover(svg, graph.edges || []);
  return svg;
}

// Ховер/клик в развёрнутом графе. При наведении на вершину голубым (var(--w-link))
// подсвечивается её ПУТЬ по НАПРАВЛЕННЫМ рёбрам: объединение всех потомков (BFS вперёд
// по source→target) и всех предков (BFS назад по target→source) плюс ТОЛЬКО рёбра,
// пройденные этими обходами. Именно поэтому через общий узел (например, Document двух
// материалов) подсветка не распространяется на чужие пути: у Material подсвечиваются его Claims
// и их Documents, у Claim — входы слева и документ справа, у Document — все его Claims
// со входами. Остальной граф НЕ затемняется. Клик по вершине фиксирует подсветку
// её пути: она остаётся после увода курсора; ховер по другим вершинам поверх фиксации
// показывает временную подсветку, но при уходе возвращает зафиксированную. Клик по фону оверлея
// (или повторный клик по зафиксированной вершине) снимает фиксацию; клик по другой вершине —
// переключает фиксацию на неё.
function attachGraphHover(svg, edges){
  const fwd = new Map(); // node.id -> Set целей его исходящих рёбер (source→target)
  const bwd = new Map(); // node.id -> Set источников его входящих рёбер (target→source)
  for (const e of edges){
    if (!fwd.has(e.source)) fwd.set(e.source, new Set());
    if (!bwd.has(e.target)) bwd.set(e.target, new Set());
    fwd.get(e.source).add(e.target);
    bwd.get(e.target).add(e.source);
  }
  const nodeEls = Array.from(svg.querySelectorAll('g[data-id]'));
  const edgeEls = Array.from(svg.querySelectorAll('path[data-source]'));

  const edgeKey = (source, target) => source + '→' + target;

  // Направленный BFS из id по карте adj: достижимые вершины + пройденные рёбра.
  // forward=true — обход вперёд (соседи — цели рёбер), false — назад (соседи —
  // источники); ключ ребра всегда в исходной ориентации source→target.
  const walk = (id, adj, forward, nodes, edgeKeys) => {
    const seen = new Set([id]);
    const queue = [id];
    while (queue.length){
      const cur = queue.shift();
      for (const nb of (adj.get(cur) || new Set())){
        edgeKeys.add(forward ? edgeKey(cur, nb) : edgeKey(nb, cur));
        if (!seen.has(nb)){ seen.add(nb); queue.push(nb); }
      }
    }
    for (const n of seen) nodes.add(n);
  };

  // путь вершины id: {nodes: Set вершин, edges: Set ключей рёбер} — потомки и предки
  const path = id => {
    const nodes = new Set(), edgeKeys = new Set();
    walk(id, fwd, true, nodes, edgeKeys);
    walk(id, bwd, false, nodes, edgeKeys);
    return { nodes, edges: edgeKeys };
  };

  // Красим путь голубым БЕЗ затемнения остального. set === null снимает всю подсветку.
  const paint = set => {
    for (const p of edgeEls){
      const inc = set && set.edges.has(edgeKey(p.getAttribute('data-source'), p.getAttribute('data-target')));
      p.style.stroke = inc ? 'var(--w-link)' : 'var(--w-line2)';
    }
    for (const g of nodeEls){
      const c = g.querySelector('circle');
      if (c) c.style.stroke = (set && set.nodes.has(g.getAttribute('data-id'))) ? 'var(--w-link)' : 'none';
    }
  };

  let pinnedNodeId = null; // зафиксированная вершина (её путь подсвечен постоянно)

  const showPinned = () => paint(pinnedNodeId ? path(pinnedNodeId) : null);

  for (const g of nodeEls){
    const id = g.getAttribute('data-id');
    g.style.cursor = 'pointer';
    // временная подсветка пути под курсором (поверх фиксации)
    g.addEventListener('mouseenter', () => paint(path(id)));
    // при уходе — вернуться к зафиксированному состоянию (или снять подсветку, если фиксации нет)
    g.addEventListener('mouseleave', showPinned);
    // клик по вершине: тот же узел — снять фиксацию, другой — зафиксировать его путь
    g.addEventListener('click', ev => {
      ev.stopPropagation(); // клик по фону оверлея не должен дополнительно снимать фиксацию
      pinnedNodeId = (pinnedNodeId === id) ? null : id;
      paint(path(id));
    });
  }

  // клик по фону svg (не по вершине) — снять фиксацию
  svg.addEventListener('click', () => { pinnedNodeId = null; paint(null); });
}

function openGraphOverlay(st){
  closeGraphOverlay();
  const dg = displayGraph(st);
  const g = dg.graph;
  const ov = el('div', 'goverlay');
  ov.id = 'goverlay';
  const panel = el('div', 'panel');
  const cap = el('div', 'cap');
  const title = dg.related ? 'Граф смежных данных' : 'Окрестность графа';
  cap.append(el('span', 't', title + ' · ' + (g.nodes || []).length + ' узлов, ' + (g.edges || []).length + ' связей'));
  const close = el('button', null, 'закрыть ✕');
  close.addEventListener('click', closeGraphOverlay);
  cap.append(close);
  panel.append(cap);
  if ((g.nodes || []).length) panel.append(graphSVG(g, 60, 880, false));
  else panel.append(el('p', 'p', 'Граф этого ответа пуст.'));
  ov.append(panel);
  ov.addEventListener('click', e => { if (e.target === ov) closeGraphOverlay(); });
  document.body.append(ov);
  close.focus();
}
function closeGraphOverlay(){
  const ov = $('#goverlay');
  if (ov) ov.remove();
}

// ==================================================================
// Экран источников
// ==================================================================
function buildSrcEntries(){
  const st = S.article;
  if (!st) return [];
  const entries = [];
  const seen = new Set();
  st.notes.forEach((note, i) => {
    if (!note.ref || !note.ref.document_id) return;
    const key = note.ref.document_id + '|' + (note.ref.fragment_id || '');
    if (seen.has(key)) return;
    seen.add(key);
    entries.push({ n: i + 1, ref: note.ref,
                   quote: note.quote || resolveQuote(st, '', note.ref) });
  });
  const r = respOf(st);
  for (const pool of [r.sources || [], r.related_sources || [], (r.search_hits || []).map(h => h.source)]){
    for (const s of pool){
      if (!s || !s.document_id) continue;
      const key = s.document_id + '|' + (s.fragment_id || '');
      if (seen.has(key)) continue;
      seen.add(key);
      entries.push({ n: null, ref: s, quote: s.quote || resolveQuote(st, '', s) });
    }
  }
  return entries;
}

// открыть источники текущего ответа; citeId — выделить конкретную сноску
function openSources(citeId){
  const entries = buildSrcEntries();
  let sel = 0;
  if (citeId && S.article){
    const note = S.article.noteMap.get(citeId);
    if (note && note.ref){
      const i = entries.findIndex(e => e.ref === note.ref ||
        (e.ref.document_id === note.ref.document_id && e.ref.fragment_id === note.ref.fragment_id));
      if (i >= 0) sel = i;
    }
  }
  S.srcView = { entries, sel, docMode: false };
  gotoRoute('sources');
}
// открыть один документ (из базы знаний), без подсветки
function openDocView(docId){
  S.srcView = {
    entries: [{ n: null, ref: { document_id: docId, fragment_id: null } }],
    sel: 0, docMode: true,
  };
  gotoRoute('sources');
}

function viewSources(view){
  const sv = S.srcView;
  if (!sv || !sv.entries.length){ location.hash = '#/'; return; }
  const grid = el('div', 'viewer');
  const list = el('div', 'vlist');
  list.append(el('div', 't', sv.docMode ? 'Просмотр документа' : ('Источники · ' + sv.entries.length)));
  sv.entries.forEach((entry, i) => {
    const b = el('button', 'vsrc' + (i === sv.sel ? ' on' : ''));
    b.append(el('span', 'n', entry.n != null ? String(entry.n) : '·'));
    const body = el('div');
    const docId = entry.ref.document_id;
    // мета файла: имя · год · происхождение · тип/научность (для подсказки и резервного отображения)
    const info = docInfo(docId);
    const bits = [docName(docId)];
    const yr = docYear(docId);
    if (yr != null) bits.push(String(yr));
    if (info && info.origin === 'ru') bits.push('РФ');
    else if (info && info.origin === 'foreign') bits.push('зарубежн.');
    const sci = sciLabel(docId);
    if (sci) bits.push(sci);
    const quote = entry.quote ? String(entry.quote).replace(/\s+/g, ' ').trim() : '';
    if (quote){
      // основной текст — цитата (до 7 строк), под ней серым имя файла в одну строку
      body.append(el('div', 'q', quote));
      body.append(el('div', 'f', docName(docId)));
    } else {
      // цитаты нет (табличный источник и т.п.) — прежний вид: имя + мета
      body.append(el('span', 'nm', docName(docId)));
      body.append(el('span', 'loc', bits.slice(1).join(' · ')));
    }
    // подсказка при наведении: полная цитата + файл с годом/происхождением/научностью
    b.title = (quote ? quote + '\n\n' : '') + bits.join(' · ');
    b.append(body);
    b.addEventListener('click', () => { sv.sel = i; render(); });
    list.append(b);
  });
  const doc = el('div', 'vdoc');
  doc.id = 'vdoc';
  grid.append(list, doc);
  view.append(grid);
  // выбранный источник всегда в поле зрения: имени файла над превью нет,
  // подсвеченная строка слева — единственный указатель, что открыто
  const on = list.querySelector('.vsrc.on');
  if (on) on.scrollIntoView({ block: 'nearest' });
  paintSourceDoc(sv.entries[sv.sel].ref);
}

// Встроенный просмотрщик pdf.js (/ui/pdfjs): в отличие от нативного, поддерживает
// открытие на заданной странице И подсветку искомого текста прямо в документе.
// Начальный hash (#page/#search) вьюер стабильно теряет на гонке инициализации,
// поэтому страница и подсветка задаются явно из родителя после загрузки
function pdfViewerUrl(fileUrl){
  return '/ui/pdfjs/web/viewer.html?file=' + encodeURIComponent(fileUrl);
}

// Фраза для поиска в PDF из текста цитаты: самый длинный ряд подряд идущих
// «словесных» слов (только буквы, ≥3 символов) — номера таблиц, цифры и тире
// текстовый слой PDF сопоставляет ненадёжно, слова из букв находятся стабильно
function pdfSearchPhrase(text){
  const words = String(text || '').replace(/\s+/g, ' ').trim().split(' ');
  let best = [];
  let cur = [];
  for (const w of words){
    if (/^[а-яёa-z]{3,}$/i.test(w)){
      cur.push(w);
      if (cur.length >= 5){ best = cur; break; }
    } else {
      if (cur.length > best.length) best = cur;
      cur = [];
    }
  }
  if (cur.length > best.length) best = cur;
  return best.slice(0, 5).join(' ');
}

// Кандидаты подсветки для цитаты: сперва цитата целиком, затем первое
// предложение, затем словесная фраза — текстовый слой PDF не всегда сопоставляет
// длинный фрагмент (переносы, дефисы), резервные кандидаты гарантируют хотя бы частичную подсветку
function citationQueries(text){
  const norm = String(text || '').replace(/\s+/g, ' ').trim();
  const out = [];
  if (norm.length >= 20) out.push(norm.slice(0, 400));
  const sentence = norm.match(/^.{30,300}?[.!?]/);
  if (sentence) out.push(sentence[0]);
  const run = pdfSearchPhrase(norm);
  if (run) out.push(run);
  return out;
}

// Управление уже открытым вьюером: прячет боковую панель, растягивает документ
// на ширину окна, переходит на страницу и подсвечивает первый найденный
// кандидат из queries. Сбой подавляется: документ остаётся открытым с начала
async function pdfViewerDrive(iframe, page, queries){
  try {
    const win = iframe.contentWindow;
    const app = win && win.PDFViewerApplication;
    if (!app) return;
    await app.initializedPromise;
    // initializedPromise ≠ «документ загружен»: pdfDocument появляется позже,
    // ждём его опросом до ~10 с (100 × 100 мс), после чего опрос прекращается без сообщения
    for (let i = 0; i < 100 && !app.pdfDocument; i++) await new Promise(r => setTimeout(r, 100));
    if (!app.pdfDocument || !document.body.contains(iframe)) return;
    // боковая панель: закрыть сейчас, запретить автооткрытие настройкой
    // (sidebarViewOnLoad=0) и выполнить отложенное повторное закрытие — оглавление
    // загружается позже и может открыть панель повторно
    try { if (app.preferences) app.preferences.set('sidebarViewOnLoad', 0); } catch (_) {}
    try { if (app.pdfSidebar) app.pdfSidebar.close(); } catch (_) {}
    setTimeout(() => { try { app.pdfSidebar && app.pdfSidebar.close(); } catch (_) {} }, 1500);
    try { app.pdfViewer.currentScaleValue = 'page-width'; } catch (_) {}
    if (page != null) app.page = page;
    const total = () => (app.findController.pageMatches || [])
      .reduce((s, m) => s + (m ? m.length : 0), 0);
    for (const q of (queries || [])){
      const query = String(q || '').replace(/\s+/g, ' ').trim();
      if (query.length < 3) continue;
      // поиск pdf.js: подсвечивает все совпадения и переходит к ближайшему
      // от текущей страницы (page выше — страховка, если текст не будет найден)
      app.eventBus.dispatch('find', { source: null, type: '', query,
        caseSensitive: false, entireWord: false, highlightAll: true, findPrevious: false });
      // ждём результат поиска; есть совпадения — кандидат сработал
      for (const delay of [600, 900]){
        await new Promise(r => setTimeout(r, delay));
        if (total() > 0) return;
      }
    }
  } catch (_) {}
}

function pdfViewerHook(iframe, page, queries){
  iframe.addEventListener('load', () => pdfViewerDrive(iframe, page, queries), { once: true });
}

// Единый выбор URL превью документа (досье и полностраничный просмотр):
// исходный PDF — оригинал, DOCX/PPTX с готовым превью — конвертированный PDF
// из MinIO, иначе null (резервный текстовый режим / заглушка)
function docPreviewSrc(d){
  const t = String((d && d.document_type) || '').toLowerCase();
  if (t === 'pdf') return '/documents/' + encodeURIComponent(d.id) + '/original';
  if (PREVIEW_TYPES.includes(t) && d.preview_object)
    return '/documents/' + encodeURIComponent(d.id) + '/preview';
  return null;
}

// Фрагменты документа с кэшем (полный ответ /documents/{id} уже кэшируется)
async function docFragments(documentId){
  let data = docFragCache.get(documentId);
  if (!data){
    data = await apiJSON('/documents/' + encodeURIComponent(documentId));
    docFragCache.set(documentId, data);
  }
  return data.fragments || data.source_fragments || [];
}

async function paintSourceDoc(ref){
  const box = $('#vdoc');
  if (!box) return;
  clear(box);
  await loadDocs();
  const info = docInfo(ref.document_id);
  // шапки над превью нет: имя файла показывает выбранная строка слева,
  // скачивание и поиск — в тулбаре pdf.js; превью занимает всю колонку

  let fragments = null; // лениво: превью-режиму нужны только для цитаты
  const ensureFragments = async () => {
    if (fragments === null) fragments = await docFragments(ref.document_id);
    return fragments;
  };

  // URL превью (единые правила с досье — docPreviewSrc); нет превью —
  // текстовые фрагменты ниже
  const pvUrl = info ? docPreviewSrc(info) : null;

  if (pvUrl){
    // цитата/факт: pdf.js открывает документ на нужной странице и подсвечивает
    // цитату ПРЯМО в документе (по текстовому слою, кандидаты от целой цитаты
    // к словесной фразе); отдельного блока-напоминания над превью нет
    const iframe = document.createElement('iframe');
    iframe.title = info ? info.filename : '';
    let page = ref.page != null ? ref.page : null;
    let hitText = null;
    if (ref.fragment_id){
      try {
        const frs = await ensureFragments();
        const hit = frs.find(f => f.id === ref.fragment_id);
        if (hit){
          if (hit.page != null) page = hit.page;
          hitText = hit.text || null;
        }
      } catch (_) {} // фрагменты не загрузились — документ отображается без подсветки
      if (!document.body.contains(box)) return;
    }
    iframe.src = pdfViewerUrl(pvUrl);
    pdfViewerHook(iframe, page, hitText ? citationQueries(hitText) : null);
    box.append(iframe);
    return;
  }

  // текстовые фрагменты по порядку
  let frs;
  try {
    frs = await ensureFragments();
  } catch (e) {
    box.append(el('div', 'vempty', 'Не удалось загрузить документ: ' + (e.message || 'ошибка сети') + '. Оригинал доступен из досье в разделе «Документы».'));
    return;
  }
  if (!document.body.contains(box)) return;
  const sorted = frs.slice().sort((a, b) => (a.page || 0) - (b.page || 0));
  if (!sorted.length){
    box.append(el('div', 'vempty', 'Фрагменты документа недоступны — скачайте оригинал.'));
    return;
  }
  let target = null;
  for (const f of sorted){
    const isHit = ref.fragment_id && f.id === ref.fragment_id;
    const d = el('div', 'frag' + (isHit ? ' hit' : ''));
    d.append(el('span', 'fn', fragLoc(ref.document_id, f.page) + (isHit ? ' · цитируется в ответе' : '')));
    d.append(document.createTextNode(f.text || ''));
    box.append(d);
    if (isHit) target = d;
  }
  if (target) target.scrollIntoView({ behavior: REDUCED ? 'auto' : 'smooth', block: 'center' });
}

function viewDocs(view){
  const wrap = el('div', 'docs');
  // заголовок раздела размещён в ЛЕВОЙ колонке: досье справа занимает раздел
  // от самого верха
  const dt = el('div', 'dt');
  dt.append(el('h3', null, 'База знаний'));
  const hint = el('span', 'hint', '');
  dt.append(hint);
  const split = el('div', 'dsplit');
  const left = el('div', 'dcol');
  const lst = el('div', 'dscroll');
  left.append(dt, lst);
  const dock = el('aside', 'ddock');
  split.append(left, dock);
  wrap.append(split);
  view.append(wrap);

  loadDocs(true).then(list => {
    if (!document.body.contains(lst)) return;
    if (!list.length){
      hint.textContent = '0 документов';
      clear(lst);
      lst.append(el('div', 'vempty', 'Документов пока нет — загрузите первые через плашку в шапке.'));
      dock.style.display = 'none'; // при пустом корпусе досье не отображается
      return;
    }
    const hiddenCount = list.filter(d => d.hidden).length;

    const renderRows = () => {
      const visible = docsFiltered(list);
      hint.textContent = (visible.length < list.length
        ? visible.length + ' из ' + list.length + ' ' + plural(list.length, 'документа', 'документов', 'документов')
        : list.length + ' ' + plural(list.length, 'документ', 'документа', 'документов'))
        + (hiddenCount ? ' · ' + hiddenCount + ' ' + plural(hiddenCount, 'скрыт', 'скрыто', 'скрыто') + ' из графа' : '');
      clear(lst);
      if (!visible.length){
        lst.append(el('div', 'vempty', 'Под выбранные фильтры ничего не попало.'));
        dock.style.display = 'none';
        return;
      }
      dock.style.display = '';
      for (const d of visible) lst.append(docListRow(d, lst, dock));
      // досье открыто всегда: выбранный ранее документ, иначе — первый видимый
      const opened = (dockDocId && visible.find(x => x.id === dockDocId)) || visible[0];
      openDock(opened, lst, dock);
    };

    dt.after(docControls(list, renderRows));
    renderRows();
  });
}

// --- фильтры и сортировка списка документов (сохраняются между перерисовками) ---
let docSciOnly = false;          // галочка «научность»: только научные документы
let docTypesSel = new Set();     // выбранные типы публикаций; пусто — не выбрано (все)
let docSort = '';                // '' (не выбрано) | 'year-asc' (ранние) | 'year-desc' (поздние)
let docQuery = '';               // поиск по названию (ё-толерантный)

const foldE = s => String(s).toLowerCase().replace(/ё/g, 'е');

function docsFiltered(list){
  const q = foldE(docQuery.trim());
  const out = list.filter(d => {
    if (docSciOnly && d.is_scientific !== true) return false;
    if (docTypesSel.size && !docTypesSel.has(d.doc_type)) return false;
    if (q && !foldE(d.filename || d.id).includes(q)) return false;
    return true;
  });
  // «не выбрано» — порядок как пришёл с сервера; документы без года — в конце
  if (docSort){
    out.sort((a, b) => docSort === 'year-asc'
      ? (a.year ?? Infinity) - (b.year ?? Infinity)
      : (b.year ?? -Infinity) - (a.year ?? -Infinity));
  }
  return out;
}

const _SVG_CHEVRON = '<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>';

// Выпадающий мультивыбор типов публикаций: пока в корпусе нет типов — в
// списке только «не выбрано»; типы пополняются из классифицированных
// документов, выбрать можно несколько
function docTypeDropdown(list, onChange){
  const types = [...new Set(list.map(d => d.doc_type).filter(Boolean))].sort();
  docTypesSel = new Set([...docTypesSel].filter(t => types.includes(t))); // типы, отсутствующие в корпусе, удаляются из выбора
  const dd = el('div', 'dd');
  const btn = el('button', 'dsel ddbtn');
  const txt = el('span', null, '');
  btn.append(txt);
  btn.insertAdjacentHTML('beforeend', _SVG_CHEVRON);
  const setLabel = () => {
    const sel = [...docTypesSel];
    txt.textContent = sel.length === 0 ? 'не выбрано'
      : sel.length <= 2 ? sel.join(', ') : 'выбрано: ' + sel.length;
  };
  setLabel();

  const pop = el('div', 'ddpop');
  if (!types.length){
    pop.append(el('div', 'ddempty', 'не выбрано'));
  } else {
    for (const t of types){
      const lab = el('label');
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = docTypesSel.has(t);
      cb.addEventListener('change', () => {
        if (cb.checked) docTypesSel.add(t); else docTypesSel.delete(t);
        setLabel();
        onChange(); // строки перерисовываются, попап остаётся открытым
      });
      lab.append(cb, ' ' + t);
      pop.append(lab);
    }
  }
  const close = e => {
    if (!dd.contains(e.target)){
      dd.classList.remove('open');
      document.removeEventListener('click', close);
    }
  };
  btn.addEventListener('click', () => {
    const opening = !dd.classList.contains('open');
    dd.classList.toggle('open', opening);
    if (opening) setTimeout(() => document.addEventListener('click', close), 0);
    else document.removeEventListener('click', close);
  });
  dd.append(btn, pop);
  return dd;
}

function docControls(list, onChange){
  const bar = el('div', 'dctrl');

  // слева: галочка «научность» — показывает только научные документы
  const lab = el('label', 'dchk');
  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.checked = docSciOnly;
  cb.addEventListener('change', () => { docSciOnly = cb.checked; onChange(); });
  lab.append(cb, ' научность');
  bar.append(lab);

  // поиск по названию: сужает список на лету, совпадение подсвечивается в строках
  const srch = document.createElement('input');
  srch.type = 'search';
  srch.className = 'dsrch';
  srch.placeholder = 'поиск по названию…';
  srch.value = docQuery;
  srch.addEventListener('input', () => { docQuery = srch.value; onChange(); });
  bar.append(srch);

  // справа, слева направо: тип публикации, затем сортировка по новизне
  const right = el('div', 'dright');
  right.append(el('span', 'dlbl', 'тип публикации:'));
  right.append(docTypeDropdown(list, onChange));
  right.append(el('span', 'dlbl', 'по новизне:'));
  const sort = document.createElement('select');
  sort.className = 'dsel';
  for (const [value, label] of [['', 'не выбрано'], ['year-asc', 'сначала ранние'], ['year-desc', 'сначала поздние']]){
    const o = document.createElement('option');
    o.value = value; o.textContent = label;
    sort.append(o);
  }
  sort.value = docSort;
  sort.addEventListener('change', () => { docSort = sort.value; onChange(); });
  right.append(sort);
  bar.append(right);
  return bar;
}

// Словесная форма научности — для подписей источников (sciLabel)
function sciWord(v){ return v === true ? 'научный' : v === false ? 'ненаучный' : '—'; }

// Заголовок строки: совпадение с поисковой строкой подсвечено (ё-толерантно)
function docTitleEl(name){
  const t = el('div', 't');
  const q = foldE(docQuery.trim());
  if (!q){ t.textContent = name; return t; }
  const folded = foldE(name);
  let pos = 0;
  let i = folded.indexOf(q);
  if (i < 0){ t.textContent = name; return t; }
  while (i >= 0){
    if (i > pos) t.append(name.slice(pos, i));
    t.append(el('span', 'hl', name.slice(i, i + q.length)));
    pos = i + q.length;
    i = folded.indexOf(q, pos);
  }
  if (pos < name.length) t.append(name.slice(pos));
  return t;
}

function docListRow(d, lst, dock){
  const row = el('div', 'docrow' + (d.hidden ? ' dim' : ''));
  row.dataset.id = d.id;
  row.append(docTitleEl(d.filename || d.id));
  // мета-строка без прочерков: показываем только известные признаки —
  // тип и научность бейджами, остальное текстом; вердикты LLM дополнят строку
  const m = el('div', 'm');
  if (d.doc_type) m.append(badge(d.doc_type, 'typ'));
  if (d.is_scientific === true) m.append(badge('научный', 'sci'));
  else if (d.is_scientific === false) m.append(badge('ненаучный', 'rep'));
  const parts = [];
  if (d.year != null) parts.push(String(d.year));
  if (d.origin === 'ru') parts.push('РФ');
  else if (d.origin === 'foreign') parts.push('зарубежн.');
  if (d.element_count != null) parts.push(d.element_count + ' фрагм.');
  if (d.status === 'processing') parts.push('обрабатывается…');
  if (d.status === 'failed') parts.push('обработка не удалась');
  if (d.hidden) parts.push('скрыт из графа');
  m.append(parts.join(' · '));
  row.append(m);
  row.addEventListener('click', () => openDock(d, lst, dock));
  return row;
}

}

function openDock(d, lst, dock){
  dockDocId = d.id;
  for (const r of lst.querySelectorAll('.docrow')) r.classList.toggle('sel', r.dataset.id === d.id);
  clear(dock);
  const dk = el('div', 'dk');

  // Структура досье — по согласованному макету: превью → «почему научный» →
  // «в графе знаний» → действия. Имя и признаки не дублируются — они в
  // выбранной строке списка слева
  // Превью: единые правила с полностраничным просмотром (docPreviewSrc);
  // ни оригинала-PDF, ни конвертированного превью — статичная заглушка
  const pvUrl = docPreviewSrc(d);
  const pv = el('div', 'pv' + (pvUrl ? '' : ' eh'));
  if (pvUrl){
    const fr = document.createElement('iframe');
    fr.src = pvUrl;
    fr.loading = 'lazy';
    pv.append(fr);
  } else pv.textContent = 'превью недоступно';
  // разворот в полностраничный просмотр (вкладка источников) — кнопка
  // в углу превью, появляется при наведении; iframe перехватывает клики
  const go = dockBtn('pvgo', 'Развернуть',
    '<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15 3h6v6M9 21H3v-6M21 3l-8 8M3 21l8-8"/></svg>');
  go.addEventListener('click', () => openDocView(d.id));
  pv.append(go);
  dk.append(pv);

  if (d.trait_reason){
    dk.append(el('div', 'lbl', d.is_scientific === false ? 'почему «ненаучный»' : 'почему «научный»'));
    dk.append(el('div', 'why', d.trait_reason));
  }

  dk.append(el('div', 'lbl', 'в графе знаний'));
  // счётчики кликабельны: фрагменты разворачивают документ, факты и
  // эксперименты открывают Review с фильтром по этому документу
  const stats = el('div', 'stats');
  const statBtn = (text, tip, fn) => {
    const b = el('button', 'stbtn', text);
    b.title = tip;
    b.addEventListener('click', fn);
    return b;
  };
  stats.append(statBtn(
    (d.element_count != null ? d.element_count : '—') + ' '
      + plural(d.element_count || 0, 'фрагмент', 'фрагмента', 'фрагментов'),
    'Развернуть', () => openDocView(d.id)));
  if (d.facts_count != null){
    stats.append(' · ', statBtn(
      d.facts_count + ' ' + plural(d.facts_count, 'факт', 'факта', 'фактов'),
      'Открыть в Review', () => openReviewForDoc(d.id)));
  }
  if (d.experiments_count != null){
    stats.append(' · ', statBtn(
      d.experiments_count + ' ' + plural(d.experiments_count, 'эксперимент', 'эксперимента', 'экспериментов'),
      'Открыть в Review', () => openReviewForDoc(d.id)));
  }
  if (d.status === 'processing') stats.append(' · обрабатывается…');
  if (d.status === 'failed') stats.append(' · обработка не удалась');
  dk.append(stats);

  const acts = el('div', 'acts');
  // на маршруте docs render() принудительно перезагружает список (viewDocs →
  // loadDocs(true)) — результат отдельного fetch перед ним был бы отброшен
  const rerender = async () => { if (routeName() === 'docs') render(); else await loadDocs(true); };

  const eye = dockBtn(d.hidden ? 'eye-off' : null, d.hidden ? 'Вернуть в Граф' : 'Скрыть из Графа',
    d.hidden ? _SVG_EYE_OFF : _SVG_EYE);
  eye.addEventListener('click', async () => {
    try {
      await apiJSON('/documents/' + encodeURIComponent(d.id) + '/visibility', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ hidden: !d.hidden }),
      });
      await rerender();
    } catch (e) {
      alert('Не удалось изменить видимость: ' + (e.detail || e.message));
    }
  });
  acts.append(eye);

  const dl = el('a', 'ic-btn');
  dl.setAttribute('aria-label', 'Скачать');
  dl.title = 'Скачать';
  dl.href = '/documents/' + encodeURIComponent(d.id) + '/original';
  dl.target = '_blank';
  dl.rel = 'noopener noreferrer';
  dl.innerHTML = _SVG_DOWNLOAD;
  acts.append(dl);

  const rf = dockBtn(null, 'Перезагрузить документ в систему', _SVG_REFRESH);
  rf.addEventListener('click', async () => {
    if (d.status === 'processing') return; // уже идёт
    try {
      await apiJSON('/documents/' + encodeURIComponent(d.id) + '/reprocess', { method: 'POST' });
      await rerender(); // строка и досье покажут «обрабатывается…»
    } catch (e) {
      alert('Перезагрузка не запустилась: ' + (e.detail || e.message));
    }
  });
  acts.append(rf);

  const del = dockBtn('trash', 'Удалить', _SVG_TRASH);
  del.addEventListener('click', async () => {
    if (!confirm('Удалить «' + (d.filename || d.id) + '» и всё извлечённое из него? Это необратимо.')) return;
    try {
      await apiJSON('/documents/' + encodeURIComponent(d.id), { method: 'DELETE' });
      docFragCache.delete(d.id);
      dockDocId = null;
      await rerender();
    } catch (e) {
      alert('Удаление не завершено: ' + (e.detail || e.message));
    }
  });
  acts.append(del);
  dk.append(acts);

  dock.append(dk);
}

function badge(text, cls){ return el('span', 'badge ' + cls, text); }
