let fnpopHideTimer = null;

function showFnpop(refEl){
  const st = S.article;
  if (!st) return;
  const note = st.notes[Number(refEl.dataset.note)];
  if (!note) return;
  const pop = $('#fnpop');
  clear(pop);
  if (note.ref && note.ref.document_id){
    pop.append(el('div', 'd', docName(note.ref.document_id)));
    if (note.quote) pop.append(el('q', null, '«' + trunc(note.quote, 300) + '»'));
    const ft = el('div', 'ft');
    const locBits = [fragLoc(note.ref.document_id, note.ref.page)];
    const sci = sciLabel(note.ref.document_id);
    if (sci) locBits.push(sci);
    ft.append(el('span', null, locBits.join(' · ')));
    const open = el('button', null, 'открыть источник →');
    open.addEventListener('click', () => { hideFnpop(); openSources(note.id); });
    ft.append(open);
    pop.append(ft);
  } else {
    pop.append(el('div', 'd', 'Источник не найден в списке ответа'));
    if (note.quote) pop.append(el('q', null, '«' + trunc(note.quote, 300) + '»'));
  }
  pop.hidden = false;
  // позиционирование у сноски, не давая уехать за края
  const r = refEl.getBoundingClientRect();
  const pw = pop.offsetWidth, ph = pop.offsetHeight;
  let left = r.left + window.scrollX - 20;
  left = Math.max(8 + window.scrollX, Math.min(left, window.scrollX + document.documentElement.clientWidth - pw - 8));
  let top = r.bottom + window.scrollY + 8;
  if (r.bottom + ph + 16 > window.innerHeight) top = r.top + window.scrollY - ph - 8;
  pop.style.left = left + 'px';
  pop.style.top = Math.max(window.scrollY + 8, top) + 'px';
}
function hideFnpop(){ const p = $('#fnpop'); if (p) p.hidden = true; }
function scheduleHideFnpop(){
  clearTimeout(fnpopHideTimer);
  fnpopHideTimer = setTimeout(hideFnpop, 250);
}
document.addEventListener('mouseover', e => {
  const ref = e.target.closest && e.target.closest('.ref[data-note]');
  if (ref){ clearTimeout(fnpopHideTimer); showFnpop(ref); }
  else if (e.target.closest && e.target.closest('#fnpop')) clearTimeout(fnpopHideTimer);
});
document.addEventListener('mouseout', e => {
  if ((e.target.closest && (e.target.closest('.ref[data-note]') || e.target.closest('#fnpop'))))
    scheduleHideFnpop();
});
document.addEventListener('click', e => {
  const ref = e.target.closest && e.target.closest('.ref[data-note]');
  if (ref){ e.preventDefault(); clearTimeout(fnpopHideTimer); showFnpop(ref); return; }
  if (!(e.target.closest && e.target.closest('#fnpop'))) hideFnpop();
});
document.addEventListener('focusin', e => {
  const ref = e.target.closest && e.target.closest('.ref[data-note]');
  if (ref) showFnpop(ref);
});

// ==================================================================
// Граф по контракту КГ: продольная раскладка слева-направо
// [Material/Process/Equipment/Condition] → [Claim] → [Document]
// ==================================================================
function nodeColor(type){
  const t = String(type || '').toLowerCase();
  if (t.includes('material'))  return 'var(--w-link)';       // голубой — исходные материалы
  if (t.includes('process') || t.includes('equipment') || t.includes('condition'))
    return '#4a648c';                                        // тёмно-синий приглушённый — процесс/оборудование/условие
  if (t.includes('claim'))     return '#5b6672';             // серый — утверждение
  if (t.includes('document'))  return '#20272f';             // тёмный — документ-источник
  return '#5b6672';                                          // неизвестный тип трактуем как Claim (серый)
}
// колонка по типу узла (контракт КГ):
//   0 — вход: Material/Process/Equipment/Condition
//   2 — Document (правый край)
//   1 — Claim и любой неизвестный тип (в т.ч. старые Property/Effect payload'ы)
const GRAPH_COL_LEFT  = ['material', 'process', 'equipment', 'condition'];
function graphColumn(type){
  const t = String(type || '').toLowerCase();
  if (GRAPH_COL_LEFT.some(k => t.includes(k))) return 0;
  if (t.includes('document')) return 2;
  return 1; // Claim и неизвестные типы — в центральную колонку, рендер не падает
}
// mini=true — компакт для инфобокса (подпись под узлом, масштаб под ширину колонки);
// mini=false — оверлей (подпись справа, пиксельный размер: высокий граф скроллится в панели)
function graphSVG(graph, maxN, w, mini){
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('role', 'img');
  svg.setAttribute('aria-label', 'граф окрестности ответа');
  const nodes = (graph.nodes || []).slice(0, maxN);
  if (!nodes.length){ svg.setAttribute('viewBox', '0 0 ' + w + ' 40'); return svg; }

  // раскладка по колонкам типа; пустые колонки схлопываются
  const byCol = [[], [], []];
  for (const n of nodes) byCol[graphColumn(n.type)].push(n);
  const cols = byCol.filter(c => c.length);

  const rowH = mini ? 30 : 46;
  const padY = mini ? 14 : 28;
  const maxRows = Math.max.apply(null, cols.map(c => c.length));
  const h = padY * 2 + maxRows * rowH;
  svg.setAttribute('viewBox', '0 0 ' + w + ' ' + h);
  if (mini) svg.setAttribute('width', '100%');
  else { svg.setAttribute('width', String(w)); svg.setAttribute('height', String(h)); }

  const padX = mini ? 8 : 30;
  const band = (w - padX * 2) / cols.length;
  const pos = new Map(); // node.id -> [x, y]
  cols.forEach((col, ci) => {
    // в мини узел по центру полосы (подпись под ним), в оверлее — у левого края (подпись справа)
    const x = padX + band * ci + (mini ? band / 2 : 14);
    col.forEach((n, ri) => {
      pos.set(n.id, [x, h / 2 + (ri - (col.length - 1) / 2) * rowH]);
    });
  });

  const r = mini ? 4 : 6;
  for (const e of (graph.edges || [])){
    if (!pos.has(e.source) || !pos.has(e.target)) continue;
    let [x1, y1] = pos.get(e.source), [x2, y2] = pos.get(e.target);
    if (x2 < x1){ const t = [x1, y1]; [x1, y1] = [x2, y2]; [x2, y2] = t; } // рисуем всегда слева-направо
    const p = document.createElementNS(ns, 'path');
    const dx = Math.max((x2 - x1) / 2, mini ? 10 : 26); // внутри одной колонки — небольшая дуга
    p.setAttribute('d', 'M' + x1.toFixed(1) + ' ' + y1.toFixed(1)
      + ' C' + (x1 + dx).toFixed(1) + ' ' + y1.toFixed(1)
      + ' ' + (x2 - dx).toFixed(1) + ' ' + y2.toFixed(1)
      + ' ' + x2.toFixed(1) + ' ' + y2.toFixed(1));
    p.setAttribute('fill', 'none');
    p.style.stroke = 'var(--w-line2)';
    // ховер-подсветка (только в оверлее): по data-source/target находим инцидентные рёбра
    p.setAttribute('data-source', e.source);
    p.setAttribute('data-target', e.target);
    svg.append(p);
  }

  for (const col of cols){
    for (const n of col){
      const [x, y] = pos.get(n.id);
      const g = document.createElementNS(ns, 'g');
      g.setAttribute('data-id', n.id); // ключ для ховер-подсветки инцидентных рёбер и соседей
      const title = document.createElementNS(ns, 'title');
      title.textContent = (n.label || n.id) + (n.type ? ' · ' + n.type : '');
      g.append(title);
      const c = document.createElementNS(ns, 'circle');
      c.setAttribute('cx', x.toFixed(1)); c.setAttribute('cy', y.toFixed(1));
      c.setAttribute('r', String(String(n.type || '').toLowerCase().includes('material') ? r + 1 : r));
      c.style.fill = nodeColor(n.type);
      if (!mini) c.setAttribute('stroke-width', '2'); // видимая обводка при ховер-подсветке
      g.append(c);
      const t = document.createElementNS(ns, 'text');
      if (mini){
        t.setAttribute('x', x.toFixed(1));
        t.setAttribute('y', (y + r + 8.5).toFixed(1));
        t.setAttribute('text-anchor', 'middle');
        t.setAttribute('font-size', '6.5');
        t.textContent = trunc(n.label || n.id, 12);
      } else {
        t.setAttribute('x', (x + r + 7).toFixed(1));
        t.setAttribute('y', (y + 3.5).toFixed(1));
        t.setAttribute('font-size', '11');
        // в оверлее полоса колонки ~290px — подписи длиннее, чтобы не резать «Конвертерный шл…»
        t.textContent = trunc(n.label || n.id, 34);
      }
      t.style.fill = 'var(--w-dim)';
      g.append(t);
      svg.append(g);
    }
  }
  if (!mini) attachGraphHover(svg, graph.edges || []);
  return svg;
}

// Ховер/клик в развёрнутом графе. При наведении на вершину голубым (var(--w-link))
// подсвечивается её ПУТЬ по НАПРАВЛЕННЫМ рёбрам: объединение всех потомков (BFS вперёд
// по source→target) и всех предков (BFS назад по target→source) плюс ТОЛЬКО рёбра,
// пройденные этими обходами. Именно поэтому через общий узел (например, Document двух
// материалов) подсветка не «перетекает» на чужие пути: у Material загораются его Claims
// и их Documents, у Claim — входы слева и документ справа, у Document — все его Claims
// со входами. Остальной граф НЕ затемняется. Клик по вершине фиксирует (пинит) подсветку
// её пути: она остаётся после увода курсора; ховер по другим вершинам поверх пина
// показывает временную подсветку, но при уходе возвращает пин. Клик по фону оверлея
// (или повторный клик по запиненной вершине) снимает фиксацию; клик по другой вершине —
// переключает пин.
function attachGraphHover(svg, edges){
  const fwd = new Map(); // node.id -> Set целей его исходящих рёбер (source→target)
  const bwd = new Map(); // node.id -> Set источников его входящих рёбер (target→source)
  for (const e of edges){
    if (!fwd.has(e.source)) fwd.set(e.source, new Set());
    if (!bwd.has(e.target)) bwd.set(e.target, new Set());
    fwd.get(e.source).add(e.target);
    bwd.get(e.target).add(e.source);
  }
  const nodeEls = Array.from(svg.querySelectorAll('g[data-id]'));
  const edgeEls = Array.from(svg.querySelectorAll('path[data-source]'));

  const edgeKey = (source, target) => source + '→' + target;

  // Направленный BFS из id по карте adj: достижимые вершины + пройденные рёбра.
  // forward=true — обход вперёд (соседи — цели рёбер), false — назад (соседи —
  // источники); ключ ребра всегда в исходной ориентации source→target.
  const walk = (id, adj, forward, nodes, edgeKeys) => {
    const seen = new Set([id]);
    const queue = [id];
    while (queue.length){
      const cur = queue.shift();
      for (const nb of (adj.get(cur) || new Set())){
        edgeKeys.add(forward ? edgeKey(cur, nb) : edgeKey(nb, cur));
        if (!seen.has(nb)){ seen.add(nb); queue.push(nb); }
      }
    }
    for (const n of seen) nodes.add(n);
  };

  // путь вершины id: {nodes: Set вершин, edges: Set ключей рёбер} — потомки и предки
  const path = id => {
    const nodes = new Set(), edgeKeys = new Set();
    walk(id, fwd, true, nodes, edgeKeys);
    walk(id, bwd, false, nodes, edgeKeys);
    return { nodes, edges: edgeKeys };
  };

  // Красим путь голубым БЕЗ затемнения остального. set === null снимает всю подсветку.
  const paint = set => {
    for (const p of edgeEls){
      const inc = set && set.edges.has(edgeKey(p.getAttribute('data-source'), p.getAttribute('data-target')));
      p.style.stroke = inc ? 'var(--w-link)' : 'var(--w-line2)';
    }
    for (const g of nodeEls){
      const c = g.querySelector('circle');
      if (c) c.style.stroke = (set && set.nodes.has(g.getAttribute('data-id'))) ? 'var(--w-link)' : 'none';
    }
  };

  let pinnedNodeId = null; // зафиксированная вершина (её путь подсвечен постоянно)

  const showPinned = () => paint(pinnedNodeId ? path(pinnedNodeId) : null);

  for (const g of nodeEls){
    const id = g.getAttribute('data-id');
    g.style.cursor = 'pointer';
    // временная подсветка пути под курсором (поверх пина)
    g.addEventListener('mouseenter', () => paint(path(id)));
    // при уходе — вернуться к зафиксированному состоянию (или снять, если пина нет)
    g.addEventListener('mouseleave', showPinned);
    // клик по вершине: тот же узел — снять пин, другой — зафиксировать его путь
    g.addEventListener('click', ev => {
      ev.stopPropagation(); // клик по фону оверлея не должен дополнительно снимать пин
      pinnedNodeId = (pinnedNodeId === id) ? null : id;
      paint(path(id));
    });
  }

  // клик по фону svg (не по вершине) — снять фиксацию
  svg.addEventListener('click', () => { pinnedNodeId = null; paint(null); });
}

// ==================================================================
// Экран источников
// ==================================================================
function buildSrcEntries(){
  const st = S.article;
  if (!st) return [];
  const entries = [];
  const seen = new Set();
  st.notes.forEach((note, i) => {
    if (!note.ref || !note.ref.document_id) return;
    const key = note.ref.document_id + '|' + (note.ref.fragment_id || '');
    if (seen.has(key)) return;
    seen.add(key);
    entries.push({ n: i + 1, ref: note.ref });
  });
  const r = respOf(st);
  for (const pool of [r.sources || [], r.related_sources || [], (r.search_hits || []).map(h => h.source)]){
    for (const s of pool){
      if (!s || !s.document_id) continue;
      const key = s.document_id + '|' + (s.fragment_id || '');
      if (seen.has(key)) continue;
      seen.add(key);
      entries.push({ n: null, ref: s });
    }
  }
  return entries;
}

// открыть источники текущего ответа; citeId — выделить конкретную сноску
function openSources(citeId){
  const entries = buildSrcEntries();
  let sel = 0;
  if (citeId && S.article){
    const note = S.article.noteMap.get(citeId);
    if (note && note.ref){
      const i = entries.findIndex(e => e.ref === note.ref ||
        (e.ref.document_id === note.ref.document_id && e.ref.fragment_id === note.ref.fragment_id));
      if (i >= 0) sel = i;
    }
  }
  S.srcView = { entries, sel, docMode: false };
  if (routeName() === 'sources') render();
  else location.hash = '#/sources';
}
// открыть один документ (из базы знаний), без подсветки
function openDocView(docId, highlightFragment){
  S.srcView = {
    entries: [{ n: null, ref: { document_id: docId, fragment_id: highlightFragment || null } }],
    sel: 0, docMode: true,
  };
  if (routeName() === 'sources') render();
  else location.hash = '#/sources';
}

function viewSources(view){
  const sv = S.srcView;
  if (!sv || !sv.entries.length){ location.hash = '#/'; return; }
  const grid = el('div', 'viewer');
  const list = el('div', 'vlist');
  list.append(el('div', 't', sv.docMode ? 'Просмотр документа' : ('Источники · ' + sv.entries.length)));
  sv.entries.forEach((entry, i) => {
    const b = el('button', 'vsrc' + (i === sv.sel ? ' on' : ''));
    b.append(el('span', 'n', entry.n != null ? String(entry.n) : '·'));
    const body = el('div');
    body.append(el('span', 'nm', docName(entry.ref.document_id)));
    const bits = [];
    const yr = docYear(entry.ref.document_id); // год издания рядом с именем файла (контракт «год статьи»)
    if (yr != null) bits.push(String(yr));
    if (entry.ref.fragment_id) bits.push(fragLoc(entry.ref.document_id, entry.ref.page));
    const sci = sciLabel(entry.ref.document_id);
    if (sci) bits.push(sci);
    if (bits.length) body.append(el('span', 'loc', bits.join(' · ')));
    b.append(body);
    b.addEventListener('click', () => { sv.sel = i; render(); });
    list.append(b);
  });
  const doc = el('div', 'vdoc');
  doc.id = 'vdoc';
  grid.append(list, doc);
  view.append(grid);
  paintSourceDoc(sv.entries[sv.sel].ref);
}

async function paintSourceDoc(ref){
  const box = $('#vdoc');
  if (!box) return;
  clear(box);
  await loadDocs();
  const info = docInfo(ref.document_id);
  const head = el('div', 'dh');
  head.append(el('span', 'name', info ? info.filename : docName(ref.document_id)));
  const kindBits = [];
  const sci = sciLabel(ref.document_id);
  if (sci) kindBits.push(sci);
  if (info && info.element_count) kindBits.push(info.element_count + ' фрагм.');
  if (kindBits.length) head.append(el('span', 'kind', kindBits.join(' · ')));
  const dl = el('a', 'dl', '⇩ Скачать оригинал');
  dl.href = '/documents/' + encodeURIComponent(ref.document_id) + '/original';
  dl.setAttribute('download', '');
  head.append(dl);
  box.append(head);

  const docType = info ? String(info.document_type || '').toLowerCase() : '';
  if (docType === 'pdf'){
    const iframe = document.createElement('iframe');
    iframe.src = '/documents/' + encodeURIComponent(ref.document_id) + '/original';
    iframe.title = info.filename;
    box.append(iframe);
    return;
  }
  // DOCX/PPTX: backend отдаёт PDF-превью (GET /documents/{id}/preview → application/pdf
  // или 404). Есть превью — показываем его в iframe, как PDF-оригинал; 404/сеть —
  // падаем в текстовые фрагменты ниже. Blob-URL кэшируется на документ, чтобы не
  // перекачивать PDF и не плодить объектные URL при каждом перерисовывании.
  if (PREVIEW_TYPES.includes(docType)){
    let url = docPreviewCache.get(ref.document_id);
    if (url === undefined){
      try {
        const res = await fetch('/documents/' + encodeURIComponent(ref.document_id) + '/preview');
        url = res.ok ? URL.createObjectURL(await res.blob()) : null;
      } catch (_) { url = null; } // сбой сети приравниваем к «превью нет» — есть текстовый фолбэк
      docPreviewCache.set(ref.document_id, url);
    }
    if (!document.body.contains(box)) return; // за время fetch экран могли сменить
    if (url){
      const iframe = document.createElement('iframe');
      iframe.src = url;
      iframe.title = info.filename;
      box.append(iframe);
      return;
    }
  }
  // текстовые фрагменты по порядку
  let data = docFragCache.get(ref.document_id);
  if (!data){
    try {
      data = await apiJSON('/documents/' + encodeURIComponent(ref.document_id));
      docFragCache.set(ref.document_id, data);
    } catch (e) {
      box.append(el('div', 'vempty', 'Не удалось загрузить документ: ' + (e.message || 'ошибка сети') + '. Оригинал можно скачать по ссылке выше.'));
      return;
    }
  }
  if (!document.body.contains(box)) return;
  const fragments = (data.fragments || data.source_fragments || []).slice();
  fragments.sort((a, b) => (a.page || 0) - (b.page || 0));
  if (!fragments.length){
    box.append(el('div', 'vempty', 'Фрагменты документа недоступны — скачайте оригинал.'));
    return;
  }
  let target = null;
  for (const f of fragments){
    const isHit = ref.fragment_id && f.id === ref.fragment_id;
    const d = el('div', 'frag' + (isHit ? ' hit' : ''));
    d.append(el('span', 'fn', fragLoc(ref.document_id, f.page) + (isHit ? ' · цитируется в ответе' : '')));
    d.append(document.createTextNode(f.text || ''));
    box.append(d);
    if (isHit) target = d;
  }
  if (target) target.scrollIntoView({ behavior: REDUCED ? 'auto' : 'smooth', block: 'center' });
}

function viewDocs(view){
  const wrap = el('div', 'docs');
  const dt = el('div', 'dt');
  dt.append(el('h3', null, 'База знаний'));
  const hint = el('span', 'hint', '');
  dt.append(hint);
  wrap.append(dt);
  const scroller = el('div');
  scroller.style.overflowX = 'auto';
  wrap.append(scroller);
  view.append(wrap);

  loadDocs(true).then(list => {
    if (!document.body.contains(scroller)) return;
    const hiddenCount = list.filter(d => d.hidden).length;
    hint.textContent = list.length + ' ' + plural(list.length, 'документ', 'документа', 'документов')
      + (hiddenCount ? ' · ' + hiddenCount + ' ' + plural(hiddenCount, 'скрыт', 'скрыто', 'скрыто') + ' из графа' : '')
      + ' · перетащите файлы в плашку, чтобы добавить';
    clear(scroller);
    if (!list.length){
      scroller.append(el('div', 'vempty', 'Документов пока нет — загрузите первые через плашку в шапке.'));
      return;
    }
    const t = el('table', 'dlist');
    const head = el('tr');
    for (const h of ['Документ', 'Год', 'Научность', 'Происхождение', 'Фрагм.', '']) head.append(el('th', null, h));
    t.append(head);
    for (const d of list) t.append(docRow(d));
    scroller.append(t);
  });
}

function badge(text, cls){ return el('span', 'badge ' + cls, text); }

function docRow(d){
  const tr = el('tr', d.hidden ? 'hidden-doc' : null);
  const name = el('td', 'name');
  const nb = el('button', null, d.filename || d.id);
  nb.title = 'открыть в просмотре источников';
  nb.addEventListener('click', () => openDocView(d.id, null));
  name.append(nb);
  tr.append(name);

  // Год издания из ТЕКСТА документа (контракт «год статьи»); нет года — «—»
  tr.append(el('td', 'num', d.year != null ? String(d.year) : '—'));

  const sci = el('td');
  if (d.is_scientific === true) sci.append(badge('научный', 'sci'));
  else if (d.is_scientific === false) sci.append(badge('отчёт', 'rep'));
  else sci.append(el('span', 'badge none', '—'));
  tr.append(sci);

  const orig = el('td');
  if (d.origin === 'ru') orig.append(badge('РФ', 'ru'));
  else if (d.origin === 'foreign') orig.append(badge('зарубежн.', 'fo'));
  else orig.append(el('span', 'badge none', '—'));
  tr.append(orig);

  tr.append(el('td', 'num', String(d.element_count != null ? d.element_count : '—')));

  const act = el('td', 'act');
  // глазик показываем, только если backend уже отдаёт признак hidden (мягкая деградация)
  if ('hidden' in d){
    const eye = el('button', 'ic-btn' + (d.hidden ? ' eye-off' : ''));
    eye.title = d.hidden ? 'вернуть в граф' : 'скрыть из графа';
    eye.innerHTML = d.hidden
      ? '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"/><circle cx="12" cy="12" r="2.6"/><line x1="4" y1="20" x2="20" y2="4"/></svg>'
      : '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"/><circle cx="12" cy="12" r="2.6"/></svg>';
    eye.addEventListener('click', async () => {
      try {
        await apiJSON('/documents/' + encodeURIComponent(d.id) + '/visibility', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ hidden: !d.hidden }),
        });
        await loadDocs(true);
        if (routeName() === 'docs') render();
      } catch (e) {
        if (e.status === 404) eye.remove(); // эндпоинт ещё не выкатан — деградируем молча
        else alert('Не удалось изменить видимость: ' + (e.detail || e.message));
      }
    });
    act.append(eye);
  }
  const del = el('button', 'ic-btn trash');
  del.title = 'удалить насовсем';
  del.innerHTML = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7h16M9 7V5h6v2m-8 0 1 13h8l1-13"/></svg>';
  del.addEventListener('click', async () => {
    if (!confirm('Удалить «' + (d.filename || d.id) + '» и всё извлечённое из него? Это необратимо.')) return;
    try {
      await apiJSON('/documents/' + encodeURIComponent(d.id), { method: 'DELETE' });
      docFragCache.delete(d.id);
      const pv = docPreviewCache.get(d.id); // blob-URL превью удалённого документа больше не нужен
      if (pv) URL.revokeObjectURL(pv);
      docPreviewCache.delete(d.id);
      await loadDocs(true);
      if (routeName() === 'docs') render();
    } catch (e) {
      alert('Удаление не завершено: ' + (e.detail || e.message));
    }
  });
  act.append(del);
  tr.append(act);
  return tr;
}

// ==================================================================
// Экран Review: фильтры, сортировка, массовые действия, пачки по 50
// ==================================================================
const REVIEW_PAGE = 50;

function viewReview(view){
  const wrap = el('div', 'review');
  const rhead = el('div', 'rhead'); // липкая шапка раздела: заголовок + фильтры + массовые действия
  const h = el('h3', null, 'Проверка извлечённых фактов');
  const tools = el('div', 'rtools'); tools.hidden = true;
  const bulk = el('div', 'rbulk'); bulk.hidden = true;
  const summary = el('div', 'rsummary'); summary.hidden = true;
  const list = el('div');
  const moreWrap = el('div');
  rhead.append(h, tools, bulk);
  wrap.append(rhead, summary, list, moreWrap);
  view.append(wrap);
  list.append(el('div', 'rempty', 'Загрузка…'));

  const RV = { items: [], selected: new Set(), sortDir: 'desc', docId: '', minConf: 0, shown: REVIEW_PAGE, busy: false };
  let selAllCb, cntEl, okAllBtn, noAllBtn;

  // фильтры и сортировка — по ВСЕМУ загруженному набору
  function filtered(){
    let arr = RV.items;
    if (RV.docId) arr = arr.filter(c => c.source && c.source.document_id === RV.docId);
    if (RV.minConf > 0) arr = arr.filter(c => (Number(c.confidence) || 0) * 100 >= RV.minConf);
    return arr.slice().sort((a, b) => {
      const d = (Number(a.confidence) || 0) - (Number(b.confidence) || 0);
      return RV.sortDir === 'asc' ? d : -d;
    });
  }

  function buildTools(){
    clear(tools);
    const lbl = (text, ctrl) => { const l = el('label'); l.append(text + ' ', ctrl); return l; };

    const sort = document.createElement('select');
    for (const [v, t] of [['desc', 'по убыванию'], ['asc', 'по возрастанию']]){
      const o = el('option', null, t); o.value = v; sort.append(o);
    }
    sort.value = RV.sortDir;
    sort.addEventListener('change', () => { RV.sortDir = sort.value; RV.shown = REVIEW_PAGE; repaint(); });
    tools.append(lbl('уверенность:', sort));

    const docSel = document.createElement('select');
    const all = el('option', null, 'все документы'); all.value = '';
    docSel.append(all);
    for (const d of (docsCache || [])){
      const o = el('option', null, trunc(d.filename || d.id, 48)); o.value = d.id; docSel.append(o);
    }
    docSel.addEventListener('change', () => { RV.docId = docSel.value; RV.shown = REVIEW_PAGE; repaint(); });
    tools.append(lbl('документ:', docSel));

    const conf = document.createElement('input');
    conf.type = 'number'; conf.min = '0'; conf.max = '100'; conf.step = '5'; conf.placeholder = '0';
    conf.addEventListener('input', () => {
      RV.minConf = Math.max(0, Math.min(100, Number(conf.value) || 0));
      RV.shown = REVIEW_PAGE;
      repaint();
    });
    tools.append(lbl('уверенность от, %:', conf));
  }

  function buildBulk(){
    clear(bulk);
    const selall = el('label', 'selall');
    selAllCb = document.createElement('input');
    selAllCb.type = 'checkbox';
    selAllCb.addEventListener('change', () => {
      if (selAllCb.checked) for (const c of filtered()) RV.selected.add(c.id);
      else RV.selected.clear();
      repaint();
    });
    selall.append(selAllCb, document.createTextNode('Выделить все'));
    cntEl = el('span', 'cnt', '');
    okAllBtn = el('button', 'ok', 'Подтвердить');
    noAllBtn = el('button', 'no', 'Отклонить');
    okAllBtn.setAttribute('aria-label', 'Подтвердить выбранные');
    noAllBtn.setAttribute('aria-label', 'Отклонить выбранные');
    okAllBtn.addEventListener('click', () => bulkAct('approve'));
    noAllBtn.addEventListener('click', () => bulkAct('reject'));
    const grp = el('div', 'grp');
    grp.append(okAllBtn, noAllBtn);
    bulk.append(selall, cntEl, grp);
  }

  function updateBulkState(){
    if (!selAllCb) return;
    const f = filtered();
    const n = RV.selected.size;
    cntEl.textContent = 'выбрано: ' + n;
    selAllCb.checked = f.length > 0 && n === f.length;
    selAllCb.indeterminate = n > 0 && n < f.length;
    selAllCb.disabled = RV.busy || !f.length;
    okAllBtn.disabled = noAllBtn.disabled = RV.busy || !n;
  }

  // на время любой операции (bulk или одиночной) глушим ВСЕ управляющие элементы,
  // чтобы кандидата нельзя было обработать дважды параллельно
  function setBusy(b){
    RV.busy = b;
    updateBulkState();
    for (const ctl of list.querySelectorAll('.racts button, .rc-chk')) ctl.disabled = b;
  }

  function repaint(){
    h.textContent = 'Проверка извлечённых фактов · ' + RV.items.length;
    tools.hidden = bulk.hidden = !RV.items.length;
    const f = filtered();
    // выделение всегда подмножество отфильтрованного набора
    const fIds = new Set(f.map(c => c.id));
    for (const id of Array.from(RV.selected)) if (!fIds.has(id)) RV.selected.delete(id);
    clear(list);
    clear(moreWrap);
    if (!RV.items.length){
      list.append(el('div', 'rempty', 'Всё проверено ✓'));
    } else if (!f.length){
      list.append(el('div', 'rempty', 'Под текущие фильтры ничего не попадает'));
    } else {
      for (const c of f.slice(0, RV.shown)) list.append(reviewCard(c));
      if (f.length > RV.shown){
        const more = el('button', 'rmore',
          'Показать ещё ' + Math.min(REVIEW_PAGE, f.length - RV.shown) + ' (скрыто ' + (f.length - RV.shown) + ')');
        more.addEventListener('click', () => { RV.shown += REVIEW_PAGE; repaint(); });
        moreWrap.append(more);
      }
    }
    updateBulkState();
  }

  function removeItems(ids){
    const gone = ids instanceof Set ? ids : new Set(ids);
    RV.items = RV.items.filter(c => !gone.has(c.id));
    for (const id of gone) RV.selected.delete(id);
  }

  function showProgress(text){
    summary.hidden = false;
    clear(summary);
    summary.append(document.createTextNode(text));
  }

  function showResult(action, okCount, failed){
    summary.hidden = false;
    clear(summary);
    summary.append(el('div', null,
      (action === 'approve' ? 'Подтверждено ' : 'Отклонено ') + okCount
      + (failed.length ? ', ошибок ' + failed.length : '')));
    if (failed.length){
      const ul = el('ul');
      for (const f of failed) ul.append(el('li', null, (f && f.id ? f.id + ': ' : '') + ((f && f.error) || 'ошибка')));
      summary.append(ul);
    }
  }

  async function bulkAct(action){
    const ids = Array.from(RV.selected);
    if (!ids.length || RV.busy) return;
    let note = null;
    if (action === 'reject'){
      const v = prompt('Причина отклонения для всех выбранных (необязательно):', '');
      if (v === null) return;
      note = v.trim() || null;
    }
    setBusy(true);
    showProgress('Обработка: ' + ids.length + ' ' + plural(ids.length, 'кандидат', 'кандидата', 'кандидатов') + '…');
    let processed = [], failed = [];
    try {
      const data = await apiJSON('/review/facts/bulk', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ candidate_ids: ids, action: action, note: note }),
      });
      failed = Array.isArray(data.failed) ? data.failed : [];
      const bad = new Set(failed.map(x => x && x.id));
      processed = ids.filter(id => !bad.has(id));
    } catch (e) {
      if (e.status !== 404){
        setBusy(false);
        showResult(action, 0, [{ id: null, error: e.detail || e.message || 'ошибка сети' }]);
        repaint();
        return;
      }
      // старый backend без bulk-эндпоинта — деградация: поштучно с прогрессом
      for (let i = 0; i < ids.length; i++){
        showProgress('Обработка ' + (i + 1) + ' / ' + ids.length + '…');
        try {
          if (action === 'approve'){
            await apiJSON('/review/facts/' + encodeURIComponent(ids[i]) + '/approve', { method: 'POST' });
          } else {
            const opts = { method: 'POST' };
            if (note){
              opts.headers = { 'Content-Type': 'application/json' };
              opts.body = JSON.stringify({ note: note });
            }
            await apiJSON('/review/facts/' + encodeURIComponent(ids[i]) + '/reject', opts);
          }
          processed.push(ids[i]);
        } catch (err) {
          failed.push({ id: ids[i], error: err.detail || err.message || 'ошибка' });
        }
      }
    }
    removeItems(processed);
    setBusy(false);
    showResult(action, processed.length, failed);
    repaint();
    pollReviewCount();
  }

  function reviewCard(c){
    const card = el('div', 'rcard');
    const chk = document.createElement('input');
    chk.type = 'checkbox';
    chk.className = 'rc-chk';
    chk.checked = RV.selected.has(c.id);
    chk.disabled = RV.busy; // repaint может случиться во время операции
    chk.setAttribute('aria-label', 'выбрать кандидата');
    chk.addEventListener('change', () => {
      if (chk.checked) RV.selected.add(c.id);
      else RV.selected.delete(c.id);
      updateBulkState();
    });
    const body = el('div', 'rc-body');
    card.append(chk, body);

    const p = c.payload || {};
    if (c.source && c.source.quote) body.append(el('div', 'rq', '«' + c.source.quote + '»'));

    const rx = el('div', 'rx');
    const bits = [];
    for (const [label, key] of [['материал', 'material'], ['процесс', 'process'], ['свойство', 'property']]){
      if (p[key]) bits.push([label, String(p[key])]);
    }
    bits.forEach(([label, value], i) => {
      if (i) rx.append(' · ');
      rx.append(label + ': ');
      rx.append(el('b', null, value));
    });
    body.append(rx);

    const nums = [];
    if (p.effect_direction) nums.push('эффект: ' + p.effect_direction + (p.effect_value != null ? ' на ' + p.effect_value + (p.effect_unit || '') : ''));
    if (p.temperature_c != null) nums.push('T = ' + p.temperature_c + ' °C');
    if (p.duration_h != null) nums.push('t = ' + p.duration_h + ' ч');
    if (p.result_value != null) nums.push('результат: ' + p.result_value + (p.result_unit ? ' ' + p.result_unit : ''));
    if (nums.length) body.append(el('div', 'rx', nums.join(' · ')));

    const meta = [];
    meta.push('confidence ' + Number(c.confidence || 0).toFixed(2));
    if (c.source && c.source.document_id)
      meta.push(docName(c.source.document_id) + ' · ' + fragLoc(c.source.document_id, c.source.page));
    body.append(el('div', 'rmeta', meta.join(' · ')));

    // замечания валидации: контрактный payload.validation.issues либо фактический number_validation.issues
    const validation = p.validation || p.number_validation || {};
    const issues = Array.isArray(validation.issues) ? validation.issues : [];
    for (const issue of issues) body.append(el('div', 'rwarn', String(issue)));
    if (c.review_note && !issues.length) body.append(el('div', 'rwarn', c.review_note));

    const acts = el('div', 'racts');
    const okBtn = el('button', 'ok', 'Подтвердить');
    const noBtn = el('button', 'no', 'Отклонить');
    okBtn.disabled = noBtn.disabled = RV.busy; // repaint может случиться во время операции
    const finish = () => {
      removeItems([c.id]);
      repaint();
      pollReviewCount();
    };
    okBtn.addEventListener('click', async () => {
      if (RV.busy) return;
      setBusy(true);
      try {
        await apiJSON('/review/facts/' + encodeURIComponent(c.id) + '/approve', { method: 'POST' });
        setBusy(false);
        finish();
      } catch (e) {
        setBusy(false);
        alert('Не удалось подтвердить: ' + (e.detail || e.message));
      }
    });
    noBtn.addEventListener('click', async () => {
      if (RV.busy) return;
      const note = prompt('Причина отклонения (необязательно):', '');
      if (note === null) return;
      setBusy(true);
      try {
        const opts = { method: 'POST' };
        if (note.trim()){
          opts.headers = { 'Content-Type': 'application/json' };
          opts.body = JSON.stringify({ note: note.trim() });
        }
        await apiJSON('/review/facts/' + encodeURIComponent(c.id) + '/reject', opts);
        setBusy(false);
        finish();
      } catch (e) {
        setBusy(false);
        alert('Не удалось отклонить: ' + (e.detail || e.message));
      }
    });
    acts.append(okBtn, noBtn);
    body.append(acts);
    return card;
  }

  Promise.all([apiJSON('/review/facts?status=pending_review'), loadDocs()])
    .then(([cands]) => {
      if (!document.body.contains(list)) return;
      RV.items = Array.isArray(cands) ? cands : [];
      buildTools();
      buildBulk();
      repaint();
    })
    .catch(e => {
      if (!document.body.contains(list)) return;
      clear(list);
      list.append(el('div', 'rempty', 'Не удалось загрузить очередь: ' + (e.message || 'ошибка сети')));
    });
}

// ==================================================================
// Красная точка Review
// ==================================================================
async function pollReviewCount(){
  const dot = $('#review-dot');
  try {
    const data = await apiJSON('/review/count');
    dot.hidden = !(data && data.pending > 0);
  } catch (_) {
    dot.hidden = true; // эндпоинт недоступен — точку прячем
  }
}
setInterval(pollReviewCount, 60000);

// ==================================================================
// Статус систем
// ==================================================================
function healthColor(h, failed){
  if (failed || !h) return 'bad';
  if (h.postgres === 'memory' || h.neo4j === 'memory') return 'bad';
  const errs = [h.postgres_last_error, h.neo4j_last_error, h.minio_last_error];
  if (errs.some(e => e) || h.answer_llm_status !== 'configured') return 'warn';
  return 'ok';
}

async function pollHealth(){
  const prev = S.health.color;
  try {
    S.health.data = await apiJSON('/health');
    S.health.failed = false;
  } catch (_) {
    S.health.failed = true;
  }
  S.health.at = Date.now();
  S.health.color = healthColor(S.health.data, S.health.failed);
  const dot = $('#sysdot');
  dot.className = 'sysdot' + (S.health.color === 'warn' ? ' warn' : S.health.color === 'bad' ? ' bad' : '');
  if (prev !== S.health.color && !REDUCED){
    dot.classList.add('changed');
    setTimeout(() => dot.classList.remove('changed'), 2200);
  }
  if (!$('#syspop').hidden) paintSyspop();
}
setInterval(pollHealth, 15000);

function paintSyspop(){
  const pop = $('#syspop');
  clear(pop);
  const h = S.health.data;
  const titles = { ok: 'всё в норме', warn: 'есть деградация', bad: 'есть сбой' };
  pop.append(el('div', 't', 'Системы · ' + titles[S.health.color]));
  const row = (name, val, cls) => {
    const r = el('div', 'row');
    r.append(el('i', cls || ''), document.createTextNode(name), el('span', null, val));
    pop.append(r);
  };
  if (S.health.failed || !h){
    row('Backend', 'нет ответа', 'bad');
  } else {
    row('Backend', h.status || '—', h.status === 'ok' ? '' : 'warn');
    row('Extraction', h.extraction || '—', '');
    row('PostgreSQL', h.postgres || '—', h.postgres === 'enabled' ? (h.postgres_last_error ? 'warn' : '') : 'bad');
    row('Neo4j', h.neo4j || '—', h.neo4j === 'enabled' ? (h.neo4j_last_error ? 'warn' : '') : 'bad');
    row('MinIO', h.minio || '—', h.minio === 'enabled' ? (h.minio_last_error ? 'warn' : '') : 'warn');
    const llmVal = [h.answer_llm_provider, h.answer_llm_model].filter(Boolean).join(' · ') || h.answer_llm_status || '—';
    row('LLM', llmVal, h.answer_llm_status === 'configured' ? '' : 'warn');
  }
  const lastErr = h ? (h.postgres_last_error || h.neo4j_last_error || h.minio_last_error || h.answer_llm_error) : null;
  const ago = Math.max(0, Math.round((Date.now() - S.health.at) / 1000));
  pop.append(el('div', 'ft', 'Последняя ошибка: ' + (lastErr ? trunc(String(lastErr), 90) : 'нет') + ' · обновлено ' + ago + ' с назад'));
}

$('#sysdot').addEventListener('mouseenter', () => { paintSyspop(); $('#syspop').hidden = false; });
$('#sysdot').addEventListener('mouseleave', () => { if (!S.health.pinned) $('#syspop').hidden = true; });
$('#sysdot').addEventListener('click', () => {
  S.health.pinned = !S.health.pinned;
  paintSyspop();
  $('#syspop').hidden = !S.health.pinned && $('#syspop').hidden;
  if (S.health.pinned) $('#syspop').hidden = false;
});
document.addEventListener('click', e => {
  if (S.health.pinned && !e.target.closest('#syspop') && !e.target.closest('#sysdot')){
    S.health.pinned = false;
    $('#syspop').hidden = true;
  }
});

// ==================================================================
// Загрузка документов (плашка в шапке)
// ==================================================================
const uplEl = $('#upl');
const fileInput = $('#file-input');
uplEl.addEventListener('click', e => {
  if (e.target.closest('#upl-pop')) return;
  fileInput.click();
});
uplEl.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' '){ e.preventDefault(); fileInput.click(); } });
fileInput.addEventListener('change', () => { onFiles(fileInput.files); fileInput.value = ''; });
uplEl.addEventListener('dragover', e => { e.preventDefault(); uplEl.classList.add('dragging'); });
uplEl.addEventListener('dragleave', () => uplEl.classList.remove('dragging'));
uplEl.addEventListener('drop', e => {
  e.preventDefault();
  uplEl.classList.remove('dragging');
  if (e.dataTransfer && e.dataTransfer.files) onFiles(e.dataTransfer.files);
});

function onFiles(fileList){
  for (const f of Array.from(fileList || [])) uploadOne(f);
  paintUplPop(true);
}

async function uploadOne(file){
  const entry = { name: file.name, status: 'в очереди', kind: 'wait', error: null };
  S.uploads.unshift(entry);
  paintUplPop(true);
  try {
    const fd = new FormData();
    fd.append('file', file, file.name);
    const data = await apiJSON('/ingest', { method: 'POST', body: fd });
    if (data.job_id){
      entry.status = 'в очереди';
      pollJob(entry, data.job_id);
    } else {
      // синхронный режим или дубль — документ уже в базе
      entry.status = 'готово ✓';
      entry.kind = 'ok';
      onUploadDone();
    }
  } catch (e) {
    entry.status = 'ошибка ✗';
    entry.kind = 'err';
    entry.error = e.detail || e.message;
  }
  paintUplPop();
}

const JOB_404_LIMIT = 5;  // подряд 404 — джоба потеряна (перезапуск backend без очереди)
const JOB_NET_LIMIT = 20; // подряд сетевых/прочих ошибок — сдаёмся с тем же исходом

function pollJob(entry, jobId){
  let miss404 = 0, missNet = 0;
  const lost = () => {
    entry.status = '✗ задача потеряна'; entry.kind = 'err';
    entry.error = 'перезагрузите файл';
    paintUplPop();
  };
  const tick = async () => {
    try {
      const job = await apiJSON('/jobs/' + encodeURIComponent(jobId));
      miss404 = missNet = 0;
      if (job.status === 'completed'){
        entry.status = 'готово ✓'; entry.kind = 'ok';
        paintUplPop();
        onUploadDone();
        return;
      }
      if (job.status === 'failed'){
        entry.status = 'ошибка ✗'; entry.kind = 'err';
        entry.error = job.error || 'обработка не удалась';
        paintUplPop();
        return;
      }
      entry.status = job.status === 'processing' ? 'обработка…' : 'в очереди';
      paintUplPop();
    } catch (e) {
      // 404 — джоба неизвестна backend'у; всё остальное (сеть, 5xx) — свой счётчик
      if (e && e.status === 404){
        if (++miss404 >= JOB_404_LIMIT){ lost(); return; }
      } else if (++missNet >= JOB_NET_LIMIT){ lost(); return; }
    }
    setTimeout(tick, 4000);
  };
  setTimeout(tick, 4000);
}

function onUploadDone(){
  loadDocs(true).then(() => {
    // ненавязчивое обновление, если открыта база знаний
    if (routeName() === 'docs') render();
  });
  pollReviewCount();
}

function paintUplPop(open){
  const pop = $('#upl-pop');
  if (open) pop.hidden = false;
  if (pop.hidden) return;
  clear(pop);
  pop.append(el('div', 't', 'Загрузки'));
  if (!S.uploads.length){
    pop.append(el('div', 'u-row', 'Перетащите файлы на плашку или кликните по ней.'));
    return;
  }
  for (const u of S.uploads.slice(0, 8)){
    const row = el('div', 'u-row');
    row.append(el('span', 'u-name', u.name));
    row.append(el('span', 'u-st' + (u.kind === 'ok' ? ' ok' : u.kind === 'err' ? ' err' : ''), u.status));
    pop.append(row);
    if (u.error) pop.append(el('div', 'u-err', trunc(u.error, 160)));
  }
}
document.addEventListener('click', e => {
  const pop = $('#upl-pop');
  if (!pop.hidden && !e.target.closest('#upl')) pop.hidden = true;
});

// ==================================================================
// Клавиатура и поиск в шапке
// ==================================================================
const hdrQ = $('#hdr-q');
const runHdrSearch = () => { const v = hdrQ.value; hdrQ.value = ''; ask(v); };
$('#hdr-search').append(searchIcon(runHdrSearch));
hdrQ.addEventListener('keydown', e => { if (e.key === 'Enter') runHdrSearch(); });

// актуальная высота шапки — в --hdr-h (sticky-панели, липкая шапка review, центровка оффтопа)
function syncHdrH(){
  // getBoundingClientRect: субпиксельная точность, чтобы под липкими блоками не было щели
  document.documentElement.style.setProperty('--hdr-h', $('#hdr').getBoundingClientRect().height + 'px');
}
new ResizeObserver(syncHdrH).observe($('#hdr'));
syncHdrH();

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && String(e.key).toLowerCase() === 'k'){
    e.preventDefault();
    const target = $('#home-q') || $('#hdr-q');
    if (target){ target.focus(); target.select(); }
    return;
  }
  if (e.key === 'Escape'){
    hideFnpop();
    closeGraphOverlay();
    $('#upl-pop').hidden = true;
    S.health.pinned = false;
    $('#syspop').hidden = true;
  }
});

// ==================================================================
// Старт
// ==================================================================
pollHealth();
pollReviewCount();
loadDocs();
render();
</script>
