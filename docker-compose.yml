services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: graphrag
      POSTGRES_USER: graphrag
      POSTGRES_PASSWORD: graphrag
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Схема применяется однократно, при первом создании тома (механика
      # docker-entrypoint-initdb.d); дальнейшие миграции выполняет ensure_schema
      # при старте backend (backend/app/persistence.py)
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graphrag -d graphrag"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/graphrag-demo
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p graphrag-demo 'RETURN 1' >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: graphrag
      MINIO_ROOT_PASSWORD: graphrag-demo
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  # Одноразовый контейнер: until-цикл ждёт готовности MinIO (заменяет ему
  # healthcheck) и создаёт бакет; --ignore-existing делает повторный запуск
  # идемпотентным. Backend дожидается его через service_completed_successfully.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 graphrag graphrag-demo; do sleep 2; done &&
      mc mb --ignore-existing local/graphrag-documents
      "

  # Мок сервиса извлечения входит в образ backend (код — backend/app/ml_mock.py),
  # отдельный образ не собирается. Свой healthcheck обязателен: HEALTHCHECK
  # образа опрашивает порт 8000, а мок слушает 8001.
  ml-mock:
    restart: unless-stopped
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["uvicorn", "app.ml_mock:app", "--host", "0.0.0.0", "--port", "8001"]
    environment:
      PYTHONPATH: /app/backend
    ports:
      - "8001:8001"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2).read()"
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  backend:
    restart: unless-stopped
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://graphrag:graphrag@postgres:5432/graphrag
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: graphrag-demo
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: graphrag
      MINIO_SECRET_KEY: graphrag-demo
      MINIO_BUCKET: graphrag-documents
      MINIO_SECURE: "false"
      EXTRACTION_SERVICE_URL: http://ml-mock:8001/extract
      # Без EMBEDDINGS_URL работает deterministic-hash (64 измерения);
      # размерность колонки vector в PostgreSQL должна совпадать с провайдером
      EMBEDDING_DIM: "64"
      PYTHONPATH: /app/backend
    volumes:
      # Та же доменная конфигурация, что у ml-extraction: правки synonyms.csv и
      # validation-rules.yaml применяются после перезапуска, без пересборки образа
      - ./domain:/app/domain:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      ml-mock:
        condition: service_healthy
    # Повторяет HEALTHCHECK образа с теми же параметрами, но добавляет
    # start_period: неуспешные проверки в первые 10 с после старта
    # не учитываются в счётчике retries
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
  neo4j-data:
  minio-data:
